<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Equipe — CRM</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="page-loader" id="pageLoader"><div class="loader-ring"></div></div>
<div id="sidebarMount"></div>
<div class="app-layout">
  <div class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        <div class="topbar-title"><h1>Equipe</h1><p>Gerencie os profissionais</p></div>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-primary btn-sm" id="btnNovo"><i class="fas fa-user-plus"></i> Novo Profissional</button>
      </div>
    </div>
    <div class="page-content">
      <div id="equipeGrid" class="client-list-grid">
        <div class="loading" style="grid-column:1/-1"><i class="fas fa-circle-notch spin"></i></div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle"><i class="fas fa-user-plus"></i> Novo Profissional</h3>
      <button class="modal-close" id="closeModal"><i class="fas fa-times"></i></button>
    </div>
    <div class="form-row form-row-2">
      <div class="form-group"><label>Nome *</label><input type="text" id="pNome" placeholder="Ana Silva"/></div>
      <div class="form-group"><label>Cargo</label><input type="text" id="pCargo" placeholder="Cabeleireira"/></div>
    </div>
    <div class="form-group"><label>Especialidade</label><input type="text" id="pEspecialidade" placeholder="Cortes e coloração"/></div>
    <div class="form-row form-row-2">
      <div class="form-group"><label>Telefone</label><input type="tel" id="pTelefone" placeholder="(11) 99999-9999"/></div>
      <div class="form-group"><label>E-mail</label><input type="email" id="pEmail" placeholder="ana@email.com"/></div>
    </div>
    <div class="form-row form-row-2">
      <div class="form-group"><label>Cor na Agenda</label><input type="color" id="pCor" value="#6366f1"/></div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-top:24px">
          <input type="checkbox" id="pAtivo" checked style="width:auto"/> Profissional ativo
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cancelModal">Cancelar</button>
      <button class="btn btn-primary" id="salvar"><i class="fas fa-save"></i> Salvar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
import { requireAuth, renderUserInSidebar, showToast, isAdmin } from './supabase/session-manager.js';
import { getAllEquipe, createProfissional, updateProfissional, deleteProfissional,
         getAllAgendamentos, formatCurrency } from './supabase/database.js';
import { getSidebarHTML, initSidebarToggle, showAdminItems } from './js/sidebar.js';

document.getElementById('sidebarMount').innerHTML = getSidebarHTML('equipe');
initSidebarToggle();
const auth = await requireAuth();
if (!auth) throw new Error('Not authenticated');
const { user, profile } = auth;
renderUserInSidebar(profile);
if (isAdmin(user,profile)) showAdminItems();
setTimeout(() => document.getElementById('pageLoader')?.classList.add('hide'), 400);
document.getElementById('logoutBtn')?.addEventListener('click', () =>
  import('./supabase/database.js').then(m => m.signOut()).then(() => window.location.href='index.html'));

let all = [], editingId = null;

async function loadAll() {
  all = await getAllEquipe(true);
  // Carrega stats de agendamentos por profissional
  const ags = await getAllAgendamentos({ limit: 500 });
  const stats = {};
  ags.forEach(a => {
    if (!a.profissional_id) return;
    if (!stats[a.profissional_id]) stats[a.profissional_id] = { total:0, receita:0 };
    stats[a.profissional_id].total++;
    if (a.status === 'concluido') stats[a.profissional_id].receita += (a.valor||0);
  });
  render(stats);
}

function render(stats = {}) {
  const grid = document.getElementById('equipeGrid');
  if (!all.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-user-tie"></i><h3>Nenhum profissional cadastrado</h3><p>Adicione sua equipe clicando em "Novo Profissional".</p></div>`;
    return;
  }
  grid.innerHTML = all.map(p => {
    const s = stats[p.id] || { total:0, receita:0 };
    const initial = (p.nome||'?')[0].toUpperCase();
    return `
    <div class="client-card">
      <div style="display:flex;gap:12px;align-items:flex-start">
        <div style="width:44px;height:44px;border-radius:50%;background:${p.cor_agenda||'#6366f1'};display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;flex-shrink:0">${initial}</div>
        <div style="flex:1;min-width:0">
          <h4 style="font-size:.92rem;font-weight:700;margin-bottom:2px">${p.nome}</h4>
          <p style="font-size:.76rem;color:var(--text2)">${p.cargo||'—'}</p>
          ${p.especialidade?`<p style="font-size:.74rem;color:var(--text3)">${p.especialidade}</p>`:''}
        </div>
        <div style="display:flex;gap:4px">
          <button class="btn btn-ghost btn-sm btn-icon" onclick="editar('${p.id}')" title="Editar"><i class="fas fa-edit"></i></button>
          <button class="btn btn-ghost btn-sm btn-icon" onclick="excluir('${p.id}')" title="Remover" style="color:var(--danger)"><i class="fas fa-trash"></i></button>
        </div>
      </div>
      ${p.telefone||p.email?`<div style="margin-top:10px;font-size:.76rem;color:var(--text2);display:flex;gap:12px;flex-wrap:wrap">
        ${p.telefone?`<span><i class="fas fa-phone"></i> ${p.telefone}</span>`:''}
        ${p.email?`<span><i class="fas fa-envelope"></i> ${p.email}</span>`:''}
      </div>`:''}
      <div class="client-card-stats">
        <div class="client-stat-item"><strong>${s.total}</strong><small>Agendamentos</small></div>
        <div class="client-stat-item"><strong>${formatCurrency(s.receita)}</strong><small>Receita</small></div>
        <div class="client-stat-item"><strong><span class="badge ${p.ativo?'badge-success':'badge-gray'}" style="font-size:.7rem">${p.ativo?'Ativo':'Inativo'}</span></strong><small>&nbsp;</small></div>
      </div>
    </div>`;
  }).join('');
}

function openModal(p = null) {
  editingId = p?.id || null;
  document.getElementById('modalTitle').innerHTML = p ? '<i class="fas fa-edit"></i> Editar Profissional' : '<i class="fas fa-user-plus"></i> Novo Profissional';
  document.getElementById('pNome').value         = p?.nome||'';
  document.getElementById('pCargo').value        = p?.cargo||'';
  document.getElementById('pEspecialidade').value= p?.especialidade||'';
  document.getElementById('pTelefone').value     = p?.telefone||'';
  document.getElementById('pEmail').value        = p?.email||'';
  document.getElementById('pCor').value          = p?.cor_agenda||'#6366f1';
  document.getElementById('pAtivo').checked      = p?.ativo??true;
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('btnNovo')?.addEventListener('click', () => openModal());
document.getElementById('closeModal')?.addEventListener('click', closeModal);
document.getElementById('cancelModal')?.addEventListener('click', closeModal);

window.editar = (id) => { const p = all.find(x=>x.id===id); if(p) openModal(p); };
window.excluir = async (id) => {
  const p = all.find(x=>x.id===id);
  if (!confirm(`Remover "${p?.nome}"?`)) return;
  try { await deleteProfissional(id); showToast('Removido.','success'); await loadAll(); }
  catch(err) { showToast(err.message,'error'); }
};

document.getElementById('salvar')?.addEventListener('click', async () => {
  const nome = document.getElementById('pNome').value.trim();
  if (!nome) { showToast('Informe o nome.','warning'); return; }
  const btn = document.getElementById('salvar'); btn.disabled=true;
  try {
    const payload = {
      nome,
      cargo:         document.getElementById('pCargo').value||null,
      especialidade: document.getElementById('pEspecialidade').value||null,
      telefone:      document.getElementById('pTelefone').value||null,
      email:         document.getElementById('pEmail').value||null,
      cor_agenda:    document.getElementById('pCor').value,
      ativo:         document.getElementById('pAtivo').checked
    };
    if (editingId) { await updateProfissional(editingId, payload); showToast('Atualizado!','success'); }
    else { await createProfissional(payload); showToast('Profissional adicionado!','success'); }
    closeModal(); await loadAll();
  } catch(err) { showToast(err.message,'error'); }
  finally { btn.disabled=false; }
});

await loadAll();
</script>
</body>
</html>
