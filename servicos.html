<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Serviços — CRM</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="page-loader" id="pageLoader"><div class="loader-ring"></div></div>
<div id="sidebarMount"></div>
<div class="app-layout">
  <div class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        <div class="topbar-title"><h1>Serviços & Produtos</h1><p>Catálogo do estabelecimento</p></div>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-ghost btn-sm" id="btnRefresh"><i class="fas fa-sync-alt"></i></button>
        <button class="btn btn-primary btn-sm" id="btnNovo"><i class="fas fa-plus"></i> Novo</button>
      </div>
    </div>
    <div class="page-content">
      <div class="filter-bar">
        <div class="search-input-wrap">
          <i class="fas fa-search"></i>
          <input class="search-input" type="text" id="searchInput" placeholder="Buscar por nome…"/>
        </div>
        <select id="filterCategoria" class="btn btn-ghost btn-sm" style="border:1px solid var(--border)">
          <option value="">Todos</option>
          <option value="servico">✂️ Serviços</option>
          <option value="produto">🛍️ Produtos</option>
        </select>
        <button class="btn btn-ghost btn-sm" id="clearFilters"><i class="fas fa-times"></i> Limpar</button>
      </div>

      <!-- Tabs Serviço / Produto -->
      <div class="tabs" style="margin-bottom:16px">
        <button class="tab-btn active" data-cat="all">📋 Todos</button>
        <button class="tab-btn" data-cat="servico">✂️ Serviços</button>
        <button class="tab-btn" data-cat="produto">🛍️ Produtos</button>
      </div>

      <div class="table-container">
        <table>
          <thead><tr>
            <th>Ícone/Cor</th><th>Nome</th><th>Categoria</th>
            <th>Preço</th><th>Duração</th><th>Estoque</th>
            <th>Status</th><th>Ações</th>
          </tr></thead>
          <tbody id="tbodyServicos">
            <tr><td colspan="8"><div class="loading"><i class="fas fa-circle-notch spin"></i></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle"><i class="fas fa-plus"></i> Novo</h3>
      <button class="modal-close" id="closeModal"><i class="fas fa-times"></i></button>
    </div>
    <div class="form-row form-row-2">
      <div class="form-group"><label>Nome *</label>
        <input type="text" id="sNome" placeholder="Corte Masculino"/></div>
      <div class="form-group"><label>Categoria *</label>
        <select id="sCategoria">
          <option value="servico">✂️ Serviço (tem duração)</option>
          <option value="produto">🛍️ Produto (sem duração)</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label>Descrição</label>
      <input type="text" id="sDescricao" placeholder="Breve descrição…"/></div>
    <div class="form-row form-row-2">
      <div class="form-group"><label>Preço (R$)</label>
        <input type="number" id="sPreco" step="0.01" min="0" placeholder="0,00"/></div>
      <div class="form-group" id="duracaoGroup"><label>Duração (min)</label>
        <input type="number" id="sDuracao" min="0" step="5" value="60" placeholder="60"/></div>
    </div>
    <div class="form-row form-row-2">
      <div class="form-group"><label>Estoque</label>
        <input type="number" id="sEstoque" value="-1" placeholder="-1 = ilimitado"/></div>
      <div class="form-group"><label>Ícone (emoji)</label>
        <input type="text" id="sIcone" placeholder="✂️" maxlength="4"/></div>
    </div>
    <div class="form-row form-row-2">
      <div class="form-group"><label>Cor</label>
        <input type="color" id="sCor" value="#6366f1"/></div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-top:24px">
          <input type="checkbox" id="sAtivo" checked style="width:auto"/> Ativo
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cancelModal">Cancelar</button>
      <button class="btn btn-primary" id="salvar"><i class="fas fa-save"></i> Salvar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
import { requireAuth, renderUserInSidebar, showToast, isAdmin } from './supabase/session-manager.js';
import { getAllServicos, createServico, updateServico, deleteServico,
         formatCurrency } from './supabase/database.js';
import { getSidebarHTML, initSidebarToggle, showAdminItems } from './js/sidebar.js';

document.getElementById('sidebarMount').innerHTML = getSidebarHTML('servicos');
initSidebarToggle();
const auth = await requireAuth();
if (!auth) throw new Error('Not authenticated');
const { user, profile } = auth;
const adminMode = isAdmin(user, profile);
renderUserInSidebar(profile);
if (adminMode) showAdminItems();
setTimeout(() => document.getElementById('pageLoader')?.classList.add('hide'), 400);
document.getElementById('logoutBtn')?.addEventListener('click', () =>
  import('./supabase/database.js').then(m => m.signOut()).then(() => window.location.href='index.html'));

// Auto-refresh every 30s
let autoRefreshTimer = setInterval(loadAll, 30000);
document.addEventListener('visibilitychange', () => {
  if (document.hidden) clearInterval(autoRefreshTimer);
  else { loadAll(); autoRefreshTimer = setInterval(loadAll, 30000); }
});
document.getElementById('btnRefresh')?.addEventListener('click', () => {
  showToast('Atualizando…','info',1500); loadAll();
});

let all = [], editingId = null, activeCategoria = 'all';

// Tabs
document.querySelectorAll('.tab-btn[data-cat]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn[data-cat]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCategoria = btn.dataset.cat;
    render();
  });
});

// Category toggle in modal (hide duration for products)
document.getElementById('sCategoria')?.addEventListener('change', e => {
  document.getElementById('duracaoGroup').style.display =
    e.target.value === 'produto' ? 'none' : '';
});

async function loadAll() {
  try {
    all = await getAllServicos(true);
    render();
  } catch(err) {
    showToast('Erro ao carregar serviços.','error');
  }
}

function render() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const catFlt = document.getElementById('filterCategoria').value || activeCategoria;
  let items = all.filter(s => {
    if (catFlt && catFlt !== 'all' && s.categoria !== catFlt) return false;
    if (search && !s.nome.toLowerCase().includes(search)) return false;
    return true;
  });

  const tbody = document.getElementById('tbodyServicos');
  if (!items.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state">
      <i class="fas fa-tags"></i><h3>Nenhum item encontrado</h3>
      ${adminMode?'<p>Clique em "Novo" para adicionar.</p>':''}
    </div></td></tr>`;
    return;
  }

  tbody.innerHTML = items.map(s => {
    const isProduct = s.categoria === 'produto';
    return `<tr>
      <td>
        <span style="display:inline-flex;align-items:center;justify-content:center;
          width:32px;height:32px;border-radius:8px;font-size:1rem;background:${s.cor}22;border:1px solid ${s.cor}44">
          ${s.icone||'?'}
        </span>
      </td>
      <td><strong>${s.nome}</strong>${s.descricao?`<br><small style="color:var(--text2)">${s.descricao}</small>`:''}</td>
      <td>
        <span class="badge ${isProduct?'badge-info':'badge-purple'}" style="font-size:.7rem">
          ${isProduct?'🛍️ Produto':'✂️ Serviço'}
        </span>
      </td>
      <td><strong>${formatCurrency(s.preco)}</strong></td>
      <td>${isProduct?'<span style="color:var(--text3)">N/A</span>':s.duracao_min+'min'}</td>
      <td>${s.estoque===-1?'∞':s.estoque}</td>
      <td><span class="badge ${s.ativo?'badge-success':'badge-gray'}" style="font-size:.7rem">${s.ativo?'Ativo':'Inativo'}</span></td>
      <td class="td-actions">
        ${adminMode?`
        <button class="btn btn-ghost btn-sm btn-icon" onclick="editar('${s.id}')" title="Editar">
          <i class="fas fa-edit"></i>
        </button>
        <button class="btn btn-ghost btn-sm btn-icon" onclick="toggleAtivo('${s.id}','${!s.ativo}')"
          title="${s.ativo?'Desativar':'Ativar'}" style="color:${s.ativo?'var(--warning)':'var(--secondary)'}">
          <i class="fas ${s.ativo?'fa-eye-slash':'fa-eye'}"></i>
        </button>`:'—'}
      </td>
    </tr>`;
  }).join('');
}

document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('filterCategoria').addEventListener('change', render);
document.getElementById('clearFilters')?.addEventListener('click',()=>{
  document.getElementById('searchInput').value='';
  document.getElementById('filterCategoria').value='';
  render();
});

// Modal
function openModal(s = null) {
  if (!adminMode) { showToast('Apenas administradores podem gerenciar serviços.','warning'); return; }
  editingId = s?.id || null;
  document.getElementById('modalTitle').innerHTML = s
    ? `<i class="fas fa-edit"></i> Editar ${s.categoria==='produto'?'Produto':'Serviço'}`
    : '<i class="fas fa-plus"></i> Novo Item';
  document.getElementById('sNome').value      = s?.nome||'';
  document.getElementById('sCategoria').value = s?.categoria||'servico';
  document.getElementById('sDescricao').value = s?.descricao||'';
  document.getElementById('sPreco').value     = s?.preco||'';
  document.getElementById('sDuracao').value   = s?.duracao_min??60;
  document.getElementById('sEstoque').value   = s?.estoque??-1;
  document.getElementById('sIcone').value     = s?.icone||'✂️';
  document.getElementById('sCor').value       = s?.cor||'#6366f1';
  document.getElementById('sAtivo').checked   = s?.ativo??true;
  document.getElementById('duracaoGroup').style.display =
    (s?.categoria==='produto') ? 'none' : '';
  document.getElementById('modal').classList.add('open');
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); }

document.getElementById('btnNovo')?.addEventListener('click', () => openModal());
document.getElementById('closeModal')?.addEventListener('click', closeModal);
document.getElementById('cancelModal')?.addEventListener('click', closeModal);

window.editar = id => { const s = all.find(x=>x.id===id); if(s) openModal(s); };
window.toggleAtivo = async (id, ativo) => {
  if (!adminMode) return;
  try {
    await updateServico(id, { ativo: ativo==='true' });
    showToast(ativo==='true'?'Ativado!':'Desativado!','success');
    await loadAll();
  } catch(err){ showToast(err.message,'error'); }
};

document.getElementById('salvar')?.addEventListener('click', async () => {
  if (!adminMode) { showToast('Sem permissão.','warning'); return; }
  const nome = document.getElementById('sNome').value.trim();
  if (!nome) { showToast('Informe o nome.','warning'); return; }
  const btn = document.getElementById('salvar'); btn.disabled=true;
  const categoria = document.getElementById('sCategoria').value;
  try {
    const payload = {
      nome,
      categoria,
      descricao:   document.getElementById('sDescricao').value||null,
      preco:       parseFloat(document.getElementById('sPreco').value)||0,
      duracao_min: categoria==='produto' ? 0 : parseInt(document.getElementById('sDuracao').value)||60,
      estoque:     parseInt(document.getElementById('sEstoque').value)??-1,
      icone:       document.getElementById('sIcone').value||'✂️',
      cor:         document.getElementById('sCor').value,
      ativo:       document.getElementById('sAtivo').checked
    };
    if (editingId) { await updateServico(editingId,payload); showToast('Atualizado!','success'); }
    else           { await createServico(payload); showToast('Adicionado!','success'); }
    closeModal(); await loadAll();
  } catch(err){ showToast(err.message,'error'); }
  finally{ btn.disabled=false; }
});

await loadAll();
</script>
</body>
</html>
