<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meu Perfil — CRM Agendamentos</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .emoji-picker-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;max-height:220px;overflow-y:auto;padding:8px;}
    .emoji-option{font-size:1.6rem;cursor:pointer;border-radius:8px;padding:6px;text-align:center;
      transition:.15s;border:2px solid transparent;}
    .emoji-option:hover{background:var(--bg3);border-color:var(--primary);}
    .emoji-option.selected{background:rgba(99,102,241,.2);border-color:var(--primary);}
    .avatar-circle{width:80px;height:80px;border-radius:50%;
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      display:flex;align-items:center;justify-content:center;
      font-size:2rem;font-weight:700;flex-shrink:0;cursor:pointer;
      border:3px solid var(--border);transition:.2s;position:relative;}
    .avatar-circle:hover{border-color:var(--primary);transform:scale(1.05);}
    .avatar-circle .edit-overlay{position:absolute;inset:0;border-radius:50%;
      background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;
      opacity:0;transition:.2s;font-size:1rem;color:#fff;}
    .avatar-circle:hover .edit-overlay{opacity:1;}
    .info-row{display:flex;justify-content:space-between;align-items:center;
      padding:10px 0;border-bottom:1px solid var(--border);font-size:.84rem;}
    .info-row:last-child{border-bottom:none;}
    .info-row span{color:var(--text2);}
    .info-row strong{color:var(--text);}
    .history-table-wrap .table-container{max-height:320px;overflow-y:auto;}
  </style>
</head>
<body>
<div class="page-loader" id="pageLoader"><div class="loader-ring"></div></div>
<div id="sidebarMount"></div>

<div class="app-layout">
  <div class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        <div class="topbar-title"><h1>Meu Perfil</h1><p>Gerencie suas informações pessoais</p></div>
      </div>
      <div class="topbar-actions">
        <a href="dashboard.html" class="btn btn-ghost btn-sm"><i class="fas fa-arrow-left"></i> Voltar</a>
      </div>
    </div>

    <div class="page-content">
      <div style="max-width:760px;margin:0 auto">

        <!-- ── Avatar + Info ── -->
        <div class="card mb-24">
          <div style="display:flex;align-items:center;gap:20px">
            <div class="avatar-circle" id="profileAvatar" title="Clique para trocar emoji" onclick="openEmojiPicker()">
              <span id="avatarDisplay">?</span>
              <div class="edit-overlay"><i class="fas fa-smile"></i></div>
            </div>
            <div style="flex:1">
              <h2 id="profileName" style="font-size:1.25rem;font-weight:800">Carregando…</h2>
              <p id="profileEmail" style="color:var(--text2);font-size:.84rem;margin-top:2px"></p>
              <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
                <span id="profileRoleBadge" class="badge badge-primary"></span>
                <span id="profilePhone" style="font-size:.78rem;color:var(--text3)"></span>
              </div>
            </div>
            <button class="btn btn-ghost btn-sm" id="btnPickEmoji" onclick="openEmojiPicker()" title="Trocar emoji de perfil">
              <i class="fas fa-smile"></i> Emoji
            </button>
          </div>
        </div>

        <!-- ── Emoji Picker Modal ── -->
        <div class="modal-overlay" id="emojiModal" style="display:none">
          <div class="modal" style="max-width:400px">
            <div class="modal-header">
              <h3><i class="fas fa-smile"></i> Escolher Emoji de Perfil</h3>
              <button class="modal-close" onclick="closeEmojiPicker()"><i class="fas fa-times"></i></button>
            </div>
            <p style="font-size:.82rem;color:var(--text2);margin-bottom:8px">Selecione um emoji para representar seu perfil:</p>
            <div class="emoji-picker-grid" id="emojiGrid"></div>
            <div class="modal-footer">
              <button class="btn btn-secondary" onclick="closeEmojiPicker()">Cancelar</button>
              <button class="btn btn-primary" id="confirmarEmoji"><i class="fas fa-check"></i> Confirmar</button>
            </div>
          </div>
        </div>

        <!-- ── Editar Informações ── -->
        <div class="card mb-24">
          <div class="card-header">
            <span class="card-title"><i class="fas fa-user-edit" style="color:var(--primary-light)"></i> Editar Informações</span>
          </div>
          <div class="form-row form-row-2">
            <div class="form-group">
              <label>Nome completo *</label>
              <input type="text" id="fNome" placeholder="Seu nome completo"/>
            </div>
            <div class="form-group">
              <label>Telefone</label>
              <input type="tel" id="fTelefone" placeholder="(XX) XXXXX-XXXX" maxlength="15"/>
            </div>
          </div>
          <div class="form-group">
            <label>URL do Avatar <small style="color:var(--text3)">(opcional — deixe em branco para usar emoji)</small></label>
            <input type="url" id="fAvatar" placeholder="https://exemplo.com/foto.jpg"/>
          </div>
          <div style="text-align:right;margin-top:4px">
            <button class="btn btn-primary" id="salvarPerfil">
              <i class="fas fa-save"></i> Salvar Alterações
            </button>
          </div>
        </div>

        <!-- ── Alterar Senha ── -->
        <div class="card mb-24">
          <div class="card-header">
            <span class="card-title"><i class="fas fa-lock" style="color:var(--warning)"></i> Alterar Senha</span>
          </div>
          <div class="form-row form-row-2">
            <div class="form-group">
              <label>Nova Senha</label>
              <div class="input-group" style="position:relative">
                <i class="fas fa-lock"></i>
                <input type="password" id="newPwd" placeholder="Mínimo 6 caracteres"/>
                <button class="toggle-password" id="toggleNew" type="button">
                  <i class="fas fa-eye" id="eyeNew"></i>
                </button>
              </div>
            </div>
            <div class="form-group">
              <label>Confirmar Nova Senha</label>
              <div class="input-group" style="position:relative">
                <i class="fas fa-lock"></i>
                <input type="password" id="confirmPwd" placeholder="Repita a nova senha"/>
                <button class="toggle-password" id="toggleConfirm" type="button">
                  <i class="fas fa-eye" id="eyeConfirm"></i>
                </button>
              </div>
              <div class="field-hint" id="pwdHint"></div>
            </div>
          </div>
          <div style="text-align:right">
            <button class="btn btn-warning" id="alterarSenha">
              <i class="fas fa-key"></i> Alterar Senha
            </button>
          </div>
        </div>

        <!-- ── Meus Agendamentos (view-only) ── -->
        <div class="card mb-24">
          <div class="card-header">
            <span class="card-title"><i class="fas fa-calendar-alt" style="color:var(--primary-light)"></i> Meu Histórico de Agendamentos</span>
            <span id="histContador" style="font-size:.78rem;color:var(--text2)"></span>
          </div>
          <div class="history-table-wrap">
            <div id="histContent">
              <div class="loading"><i class="fas fa-circle-notch spin"></i> Carregando histórico…</div>
            </div>
          </div>
        </div>

        <!-- ── Informações da Conta ── -->
        <div class="card">
          <div class="card-header">
            <span class="card-title"><i class="fas fa-info-circle" style="color:var(--info)"></i> Informações da Conta</span>
          </div>
          <div id="accountInfo">
            <div class="loading"><i class="fas fa-circle-notch spin"></i></div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
import { requireAuth, renderUserInSidebar, showToast, isAdmin, isStaff } from './supabase/session-manager.js';
import { updateUserProfile, getAllAgendamentos, formatDateTime, formatCurrency, STATUS_LABELS, applyPhoneMask } from './supabase/database.js';
import { sb } from './supabase/client.js';
import { getSidebarHTML, initSidebarToggle, showAdminItems, showStaffItems } from './js/sidebar.js';

document.getElementById('sidebarMount').innerHTML = getSidebarHTML('');
initSidebarToggle();

const auth = await requireAuth();
if (!auth) throw new Error('Not authenticated');
const { user, profile } = auth;
renderUserInSidebar(profile);
if (isAdmin(user, profile)) showAdminItems();
else if (isStaff(user, profile)) showStaffItems();
setTimeout(() => document.getElementById('pageLoader')?.classList.add('hide'), 400);

document.getElementById('logoutBtn')?.addEventListener('click', () =>
  import('./supabase/database.js').then(m => m.signOut()).then(() => window.location.href = 'index.html'));

// ── Emoji list ───────────────────────────────────────────────
const EMOJIS = [
  '😊','😎','🤩','😍','🥳','🤗','😄','😁','😆','🙂','🤓','🧐',
  '👩','👨','👩‍🦱','👨‍🦱','👩‍🦰','👨‍🦰','👩‍🦳','👨‍🦳','🧑','👱','👸','🤴',
  '💅','💇','💆','🧖','🧑‍🦲','👼','🧚','🧜','🦸','🦹','🧙','🧛',
  '🌟','⭐','✨','💫','🔥','💎','🌈','🌺','🌸','🌻','🍀','🦋',
  '🐱','🐶','🦊','🦁','🐸','🐼','🐨','🦄','🐬','🦜','🐧','🦚',
];

let selectedEmoji = profile.avatar_emote || '😊';

function buildEmojiGrid() {
  const grid = document.getElementById('emojiGrid');
  grid.innerHTML = EMOJIS.map(e =>
    `<div class="emoji-option${e === selectedEmoji ? ' selected' : ''}" data-emoji="${e}" onclick="selectEmoji('${e}')">${e}</div>`
  ).join('');
}

window.selectEmoji = (e) => {
  selectedEmoji = e;
  document.querySelectorAll('.emoji-option').forEach(el =>
    el.classList.toggle('selected', el.dataset.emoji === e));
};

window.openEmojiPicker = () => {
  buildEmojiGrid();
  const m = document.getElementById('emojiModal');
  m.style.display = 'flex';
  requestAnimationFrame(() => m.classList.add('open'));
};
window.closeEmojiPicker = () => {
  const m = document.getElementById('emojiModal');
  m.classList.remove('open');
  setTimeout(() => m.style.display = 'none', 250);
};

document.getElementById('confirmarEmoji')?.addEventListener('click', async () => {
  try {
    await updateUserProfile(user.id, { avatar_emote: selectedEmoji });
    document.getElementById('avatarDisplay').textContent = selectedEmoji;
    renderUserInSidebar({ ...profile, avatar_emote: selectedEmoji });
    showToast('Emoji atualizado!', 'success');
    closeEmojiPicker();
  } catch (err) {
    showToast(err.message || 'Erro ao salvar emoji.', 'error');
  }
});

// ── Render profile ───────────────────────────────────────────
const roleLabels = { admin: '👑 Admin', atendente: '🧑‍💼 Atendente', user: '👤 Usuário' };
document.getElementById('profileName').textContent     = profile.nome || '—';
document.getElementById('profileEmail').textContent    = user.email || '—';
document.getElementById('profileRoleBadge').textContent = roleLabels[profile.role] || '👤 Usuário';
document.getElementById('profilePhone').textContent    = profile.telefone ? '📞 ' + profile.telefone : '';

const avatarEl = document.getElementById('avatarDisplay');
if (profile.avatar_url) {
  const av = document.getElementById('profileAvatar');
  av.style.backgroundImage = `url(${profile.avatar_url})`;
  av.style.backgroundSize  = 'cover';
  av.style.fontSize        = '0';
} else {
  avatarEl.textContent = profile.avatar_emote || (profile.nome || 'U')[0].toUpperCase();
}

// ── Form fields ──────────────────────────────────────────────
document.getElementById('fNome').value     = profile.nome || '';
document.getElementById('fTelefone').value = profile.telefone || '';
document.getElementById('fAvatar').value   = profile.avatar_url || '';

// Apply phone mask
applyPhoneMask(document.getElementById('fTelefone'));

// ── Account info ─────────────────────────────────────────────
document.getElementById('accountInfo').innerHTML = [
  { label: 'E-mail',             value: user.email },
  { label: 'Nível de Acesso',    value: roleLabels[profile.role] || '—' },
  { label: 'Membro desde',       value: new Date(profile.created_at || user.created_at).toLocaleDateString('pt-BR') },
  { label: 'Última atualização', value: profile.updated_at ? new Date(profile.updated_at).toLocaleDateString('pt-BR') : '—' },
].map(i => `
  <div class="info-row">
    <span>${i.label}</span>
    <strong>${i.value}</strong>
  </div>`).join('');

// ── Save profile ─────────────────────────────────────────────
document.getElementById('salvarPerfil')?.addEventListener('click', async () => {
  const nome     = document.getElementById('fNome').value.trim();
  const telefone = document.getElementById('fTelefone').value.trim();
  const avatar   = document.getElementById('fAvatar').value.trim();
  if (!nome) { showToast('Informe seu nome.', 'warning'); return; }
  const btn = document.getElementById('salvarPerfil');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-circle-notch spin"></i> Salvando…';
  try {
    // updateUserProfile already uses UPDATE with .eq('id', userId)
    // which is allowed by RLS policy: uid() = id OR is_admin()
    await updateUserProfile(user.id, {
      nome,
      telefone: telefone || null,
      avatar_url: avatar || null
    });
    showToast('Perfil atualizado com sucesso!', 'success');
    // Update local profile object to reflect persisted data
    Object.assign(profile, { nome, telefone: telefone || null, avatar_url: avatar || null });
    document.getElementById('profileName').textContent  = nome;
    document.getElementById('profilePhone').textContent = telefone ? '📞 ' + telefone : '';
    // Update avatar display
    const av = document.getElementById('profileAvatar');
    if (avatar) {
      av.style.backgroundImage = `url(${avatar})`;
      av.style.backgroundSize  = 'cover';
      av.style.fontSize        = '0';
    } else {
      av.style.backgroundImage = '';
      av.style.fontSize        = '';
      avatarEl.textContent = profile.avatar_emote || selectedEmoji || nome[0].toUpperCase();
    }
    // Update sidebar to reflect new name/avatar
    renderUserInSidebar(profile);
  } catch (err) {
    showToast(err.message || 'Erro ao salvar perfil.', 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-save"></i> Salvar Alterações';
  }
});

// ── Password visibility ──────────────────────────────────────
function togglePwd(inputId, iconId) {
  const input = document.getElementById(inputId);
  const icon  = document.getElementById(iconId);
  if (!input || !icon) return;
  input.type = input.type === 'password' ? 'text' : 'password';
  icon.className = input.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
}
document.getElementById('toggleNew')?.addEventListener('click', () => togglePwd('newPwd', 'eyeNew'));
document.getElementById('toggleConfirm')?.addEventListener('click', () => togglePwd('confirmPwd', 'eyeConfirm'));

document.getElementById('confirmPwd')?.addEventListener('input', () => {
  const pwd  = document.getElementById('newPwd')?.value;
  const conf = document.getElementById('confirmPwd')?.value;
  const hint = document.getElementById('pwdHint');
  if (!hint || !conf) return;
  hint.textContent = pwd === conf ? '✓ Senhas conferem' : '✗ Senhas não conferem';
  hint.className   = `field-hint ${pwd === conf ? 'ok' : 'err'}`;
});

// ── Change password ──────────────────────────────────────────
document.getElementById('alterarSenha')?.addEventListener('click', async () => {
  const pwd     = document.getElementById('newPwd').value;
  const confirm = document.getElementById('confirmPwd').value;
  if (!pwd || pwd.length < 6) { showToast('Senha deve ter pelo menos 6 caracteres.', 'warning'); return; }
  if (pwd !== confirm)        { showToast('As senhas não conferem.', 'warning'); return; }
  const btn = document.getElementById('alterarSenha');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-circle-notch spin"></i> Alterando…';
  try {
    const { error } = await sb.auth.updateUser({ password: pwd });
    if (error) throw error;
    showToast('Senha alterada com sucesso!', 'success');
    document.getElementById('newPwd').value     = '';
    document.getElementById('confirmPwd').value = '';
    document.getElementById('pwdHint').textContent = '';
  } catch (err) {
    showToast(err.message || 'Erro ao alterar senha.', 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-key"></i> Alterar Senha';
  }
});

// ── My appointments history (view-only) ──────────────────────
async function loadHistory() {
  const el = document.getElementById('histContent');
  try {
    // Get client record linked to this user's email
    const { data: clienteRows } = await sb.from('clientes').select('id').eq('email', user.email).limit(1);
    const clienteId = clienteRows?.[0]?.id;

    let ags = [];
    if (clienteId) {
      ags = await getAllAgendamentos({ cliente_id: clienteId, limit: 50 });
    } else {
      // Show all created by this user
      const { data } = await sb.from('agendamentos')
        .select(`*,
          clientes(id,nome),
          agendamento_servicos(servicos(nome,icone),equipe(nome,cor_agenda))
        `)
        .eq('criado_por', user.id)
        .order('data_hora', { ascending: false }).limit(50);
      ags = data ?? [];
    }

    document.getElementById('histContador').textContent = ags.length ? `${ags.length} agendamento(s)` : '';

    if (!ags.length) {
      el.innerHTML = '<div class="empty-state"><i class="fas fa-calendar-check"></i><h3>Nenhum agendamento encontrado</h3><p>Seus agendamentos aparecerão aqui.</p></div>';
      return;
    }

    el.innerHTML = `<div class="table-container" style="max-height:320px;overflow-y:auto"><table>
      <thead><tr><th>Data/Hora</th><th>Serviços</th><th>Profissional</th><th>Total</th><th>Status</th></tr></thead>
      <tbody>
      ${ags.map(ag => {
        const st = STATUS_LABELS[ag.status] || {};
        const servNomes = ag.agendamento_servicos?.map(s=>s.servicos?.nome||'').filter(Boolean).join(', ')||'—';
        const prof = ag.agendamento_servicos?.[0]?.equipe?.nome||'—';
        return `<tr>
          <td>${formatDateTime(ag.data_hora)}</td>
          <td>${servNomes}</td>
          <td>${prof}</td>
          <td><strong>${formatCurrency(ag.valor_total||0)}</strong></td>
          <td><span class="badge" style="background:${st.color}22;color:${st.color}">${st.icon||''} ${st.label||ag.status}</span></td>
        </tr>`;
      }).join('')}
      </tbody></table></div>`;
  } catch (err) {
    el.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><h3>Erro ao carregar histórico</h3></div>`;
    console.error(err);
  }
}
loadHistory();
</script>
</body>
</html>
