<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat — CRM</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    /* ── Chat layout ── */
    .chat-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 0;
      height: calc(100vh - 70px);
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--bg2);
    }
    @media (max-width: 700px) {
      .chat-layout { grid-template-columns: 1fr; }
      .chat-sidebar { display: none; }
      .chat-sidebar.mobile-show { display: flex; }
      .chat-main { display: none; }
      .chat-main.mobile-show { display: flex; }
    }

    /* ── Left: client list ── */
    .chat-sidebar {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--bg2);
      overflow: hidden;
    }
    .chat-sidebar-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      font-size: .9rem;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .chat-search {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .chat-search input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      color: var(--text);
      font-size: .82rem;
    }
    .chat-client-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }
    .chat-client-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      transition: .12s;
      border-left: 3px solid transparent;
    }
    .chat-client-item:hover { background: var(--bg3); }
    .chat-client-item.active {
      background: rgba(99,102,241,.12);
      border-left-color: var(--primary);
    }
    .chat-client-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: .85rem; flex-shrink: 0; color: #fff;
    }
    .chat-client-info { flex: 1; min-width: 0; }
    .chat-client-name {
      font-size: .84rem; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .chat-client-preview {
      font-size: .73rem; color: var(--text3);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .chat-unread-badge {
      background: var(--primary); color: #fff;
      border-radius: 10px; font-size: .67rem; font-weight: 700;
      padding: 2px 6px; min-width: 18px; text-align: center; flex-shrink: 0;
    }

    /* ── Right: conversation ── */
    .chat-main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }
    .chat-conv-header {
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg2);
      flex-shrink: 0;
    }
    .chat-conv-title { font-size: .9rem; font-weight: 700; }
    .chat-conv-sub   { font-size: .75rem; color: var(--text3); }
    .chat-online-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #10b981; flex-shrink: 0;
    }

    /* ── Messages area ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px 18px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .chat-date-divider {
      text-align: center;
      font-size: .72rem;
      color: var(--text3);
      margin: 4px 0;
      position: relative;
    }
    .chat-date-divider::before, .chat-date-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 35%;
      height: 1px;
      background: var(--border);
    }
    .chat-date-divider::before { left: 0; }
    .chat-date-divider::after  { right: 0; }

    .msg-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      max-width: 80%;
    }
    .msg-row.mine { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.theirs { align-self: flex-start; }

    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem; font-weight: 700; flex-shrink: 0; color: #fff;
    }
    .msg-bubble {
      padding: 9px 13px;
      border-radius: 14px;
      font-size: .84rem;
      line-height: 1.45;
      max-width: 100%;
      word-break: break-word;
    }
    .msg-row.mine   .msg-bubble {
      background: var(--primary);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-row.theirs .msg-bubble {
      background: var(--bg3);
      color: var(--text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }
    .msg-meta {
      font-size: .67rem;
      color: var(--text3);
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .msg-row.mine   .msg-meta { justify-content: flex-end; }

    /* ── Input bar ── */
    .chat-input-bar {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--bg2);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .chat-input-wrap {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 9px 14px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .chat-input-wrap textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: .87rem;
      resize: none;
      max-height: 120px;
      font-family: inherit;
      line-height: 1.4;
    }
    .chat-send-btn {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--primary); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: .95rem; flex-shrink: 0; transition: .15s;
    }
    .chat-send-btn:hover  { background: var(--primary-dark, #4f46e5); }
    .chat-send-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Empty / placeholder state ── */
    .chat-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--text3); gap: 10px;
    }
    .chat-empty i   { font-size: 2.5rem; opacity: .35; }
    .chat-empty h3  { font-size: .95rem; font-weight: 600; }
    .chat-empty p   { font-size: .8rem; }

    /* ── New conversation button ── */
    .btn-new-chat {
      margin: 10px 12px 4px;
      width: calc(100% - 24px);
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 9px;
      padding: 8px 0;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: .15s;
      flex-shrink: 0;
    }
    .btn-new-chat:hover { opacity: .88; }

    /* ── Typing indicator ── */
    .typing-indicator {
      display: flex; gap: 4px; align-items: center; padding: 6px 12px;
    }
    .typing-indicator span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text3); animation: typing .8s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: .15s; }
    .typing-indicator span:nth-child(3) { animation-delay: .3s; }
    @keyframes typing { 0%,80%,100%{transform:scale(1)} 40%{transform:scale(1.4)} }

    /* ── Admin: pick client modal ── */
    .pick-client-list { max-height: 320px; overflow-y: auto; margin-top: 10px; }
    .pick-client-item {
      display: flex; align-items: center; gap: 10px; padding: 9px 12px;
      border-radius: 9px; cursor: pointer; transition: .12s;
      border: 1px solid transparent;
    }
    .pick-client-item:hover { background: var(--bg3); border-color: var(--border); }
  </style>
</head>
<body>
<div class="page-loader" id="pageLoader"><div class="loader-ring"></div></div>
<div id="sidebarMount"></div>
<div class="app-layout">
  <div class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        <div class="topbar-title"><h1>Chat</h1><p id="chatSubtitle">Mensagens em tempo real</p></div>
      </div>
      <div class="topbar-actions">
        <div class="profile-dropdown">
          <button class="profile-btn" id="profileBtn">
            <div class="profile-btn-avatar" id="topbarAvatar">?</div>
            <span id="topbarNome" style="font-size:.82rem;font-weight:600">…</span>
            <i class="fas fa-chevron-down" style="font-size:.7rem;color:var(--text2)"></i>
          </button>
          <div class="profile-dropdown-menu" id="profileMenu">
            <a href="perfil.html" class="dropdown-item"><i class="fas fa-user"></i> Meu Perfil</a>
            <div class="dropdown-divider"></div>
            <div class="dropdown-item danger" id="dropLogout"><i class="fas fa-sign-out-alt"></i> Sair</div>
          </div>
        </div>
      </div>
    </div>

    <div class="page-content" style="padding:0;overflow:hidden;height:calc(100vh - 72px)">
      <div class="chat-layout" id="chatLayout">

        <!-- ── LEFT: Client list (admin view) / single-thread (client view) ── -->
        <div class="chat-sidebar" id="chatSidebar">
          <div class="chat-sidebar-header">
            <i class="fas fa-comments" style="color:var(--primary-light)"></i>
            <span>Conversas</span>
            <span id="totalConvs" style="margin-left:auto;font-size:.75rem;color:var(--text3)"></span>
          </div>
          <!-- Admin-only: search + new chat -->
          <div id="adminSidebarControls" style="display:none">
            <button class="btn-new-chat" id="btnNewChat">
              <i class="fas fa-plus"></i> Nova Conversa
            </button>
            <div class="chat-search">
              <input type="text" id="searchCliente" placeholder="Buscar cliente…"/>
            </div>
          </div>
          <div class="chat-client-list" id="clientList">
            <div style="padding:20px;text-align:center;color:var(--text3);font-size:.82rem">
              <i class="fas fa-circle-notch spin"></i> Carregando…
            </div>
          </div>
        </div>

        <!-- ── RIGHT: Conversation ── -->
        <div class="chat-main" id="chatMain">
          <!-- Placeholder when no conversation selected -->
          <div class="chat-empty" id="chatEmpty">
            <i class="fas fa-comments"></i>
            <h3>Selecione uma conversa</h3>
            <p>Clique em um cliente na lista ao lado</p>
          </div>

          <!-- Active conversation (hidden until client selected) -->
          <div id="chatConv" style="display:none;flex-direction:column;flex:1;overflow:hidden">
            <div class="chat-conv-header">
              <div class="chat-client-avatar" id="convAvatar">?</div>
              <div>
                <div class="chat-conv-title" id="convName">—</div>
                <div class="chat-conv-sub"  id="convSub">—</div>
              </div>
              <span class="chat-online-dot" id="convOnlineDot" style="display:none" title="Online"></span>
              <div style="margin-left:auto;display:flex;gap:8px">
                <button class="btn btn-ghost btn-sm" id="btnMarkRead" title="Marcar como lido">
                  <i class="fas fa-check-double"></i>
                </button>
              </div>
            </div>

            <div class="chat-messages" id="chatMessages">
              <!-- messages rendered here -->
            </div>

            <div class="chat-input-bar">
              <div class="chat-input-wrap">
                <textarea id="msgInput" placeholder="Digite sua mensagem…" rows="1"
                  oninput="autoResizeTA(this)" onkeydown="handleMsgKeydown(event)"></textarea>
              </div>
              <button class="chat-send-btn" id="sendBtn" title="Enviar (Enter)">
                <i class="fas fa-paper-plane"></i>
              </button>
            </div>
          </div>
        </div>

      </div><!-- /chat-layout -->
    </div>
  </div>
</div>

<!-- ── MODAL: Pick client (admin new chat) ── -->
<div class="modal-overlay" id="modalPickClient">
  <div class="modal">
    <div class="modal-header">
      <h3><i class="fas fa-user-plus"></i> Nova Conversa</h3>
      <button class="modal-close" id="closePickClient"><i class="fas fa-times"></i></button>
    </div>
    <div class="form-group">
      <label>Buscar cliente</label>
      <input type="text" id="pickSearch" placeholder="Nome ou e-mail…" oninput="filterPickList()"/>
    </div>
    <div class="pick-client-list" id="pickClientList"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
import { requireAuth, renderUserInSidebar, showToast, isAdmin, isStaff } from './supabase/session-manager.js';
import {
  getChatMessages, sendChatMessage, markMessagesAsRead, getUnreadChatCount,
  getChatClientes, subscribeChat, ensureUserAndClient,
  getAllClientes, formatDateTime
} from './supabase/database.js';
import { getSidebarHTML, initSidebarToggle, showAdminItems, showStaffItems, updateChatBadge } from './js/sidebar.js';

// ── Init ─────────────────────────────────────────────────────
document.getElementById('sidebarMount').innerHTML = getSidebarHTML('chat');
initSidebarToggle();

const auth = await requireAuth();
if (!auth) throw new Error('Not authenticated');
const { user, profile } = auth;
const adminMode = isAdmin(user, profile);
const staffMode = isStaff(user, profile);

renderUserInSidebar(profile);
if (adminMode) showAdminItems();
else if (staffMode) showStaffItems();
setTimeout(() => document.getElementById('pageLoader')?.classList.add('hide'), 400);

// Topbar avatar/name
const ta = document.getElementById('topbarAvatar');
const tn = document.getElementById('topbarNome');
if (ta) {
  if (profile.avatar_url) {
    ta.style.backgroundImage = `url(${profile.avatar_url})`;
    ta.style.backgroundSize  = 'cover';
    ta.textContent = '';
  } else if (profile.avatar_emote) {
    ta.textContent = profile.avatar_emote;
  } else {
    ta.textContent = (profile.nome || 'U')[0].toUpperCase();
  }
}
if (tn) tn.textContent = profile.nome?.split(' ')[0] || 'Usuário';

// Profile dropdown
const profileBtn  = document.getElementById('profileBtn');
const profileMenu = document.getElementById('profileMenu');
profileBtn?.addEventListener('click', e => { e.stopPropagation(); profileMenu?.classList.toggle('open'); });
document.addEventListener('click', () => profileMenu?.classList.remove('open'));

// Logout
const doLogout = () =>
  import('./supabase/database.js').then(m => m.signOut()).then(() => window.location.href = 'index.html');
document.getElementById('dropLogout')?.addEventListener('click', doLogout);
document.getElementById('logoutBtn')?.addEventListener('click', doLogout);

// ── State ────────────────────────────────────────────────────
let allClientes   = [];
let conversations = []; // { cliente_id, nome, telefone, email, lastMsg, unread }
let activeId      = null; // currently open cliente_id
let myClienteId   = null;
let realtimeSub   = null;
let allClientsMap = {}; // id -> cliente object (for admin pick modal)

// ── Ensure current user has a client record ──────────────────
try {
  const result = await ensureUserAndClient(user);
  if (result?.cliente_id) myClienteId = result.cliente_id;
  else {
    allClientes  = await getAllClientes();
    myClienteId  = allClientes.find(c => c.user_id === user.id || c.email === user.email)?.id || null;
  }
} catch (e) { console.warn('ensureUserAndClient chat:', e); }

// ── Load conversation list ────────────────────────────────────
async function loadConversations() {
  if (adminMode) {
    // Admin sees ALL clients that have exchanged messages, plus can start new ones
    document.getElementById('adminSidebarControls').style.display = '';
    const chatClientes = await getChatClientes();
    conversations = chatClientes.map(c => ({
      cliente_id: c.id, nome: c.nome || '—',
      telefone: c.telefone || '', email: c.email || '',
      lastMsg: '', unread: 0
    }));
    // Count unread per client
    for (const conv of conversations) {
      try {
        const msgs = await getChatMessages(conv.cliente_id, 1000);
        conv.lastMsg = msgs[msgs.length - 1]?.mensagem || '';
        conv.unread  = msgs.filter(m => !m.de_admin && !m.lida).length;
      } catch { /* skip */ }
    }
  } else {
    // Regular user: only their own thread
    if (!myClienteId) {
      document.getElementById('clientList').innerHTML =
        `<div style="padding:16px;font-size:.82rem;color:var(--text3);text-align:center">
          <i class="fas fa-exclamation-circle" style="color:var(--warning)"></i><br>
          Cadastro não encontrado.<br>Faça login novamente para criar seu perfil.
        </div>`;
      return;
    }
    conversations = [{
      cliente_id: myClienteId,
      nome: profile?.nome || user.email,
      telefone: profile?.telefone || '',
      email: user.email,
      lastMsg: '', unread: 0
    }];
    // Auto-open own thread
    setTimeout(() => openConversation(myClienteId), 100);
  }

  document.getElementById('totalConvs').textContent =
    conversations.length ? `${conversations.length} conversa(s)` : '';
  renderClientList(conversations);

  // Update global chat badge
  const totalUnread = conversations.reduce((a, c) => a + c.unread, 0);
  updateChatBadge(totalUnread);
}

function renderClientList(list) {
  const el = document.getElementById('clientList');
  if (!list.length) {
    el.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text3);font-size:.82rem">
      <i class="fas fa-comment-slash"></i><br>Nenhuma conversa ainda.
      ${adminMode ? '<br>Clique em "+ Nova Conversa" para começar.' : ''}
    </div>`;
    return;
  }
  el.innerHTML = list.map(c => {
    const initial = (c.nome || '?')[0].toUpperCase();
    const isActive = c.cliente_id === activeId;
    return `<div class="chat-client-item${isActive ? ' active' : ''}"
         onclick="openConversation('${c.cliente_id}')">
      <div class="chat-client-avatar">${initial}</div>
      <div class="chat-client-info">
        <div class="chat-client-name">${c.nome}</div>
        <div class="chat-client-preview">${c.lastMsg || 'Sem mensagens'}</div>
      </div>
      ${c.unread > 0
        ? `<span class="chat-unread-badge">${c.unread > 99 ? '99+' : c.unread}</span>`
        : ''}
    </div>`;
  }).join('');
}

// ── Open a conversation ───────────────────────────────────────
window.openConversation = async (clienteId) => {
  activeId = clienteId;
  const conv = conversations.find(c => c.cliente_id === clienteId)
    || { cliente_id: clienteId, nome: '…', telefone: '', email: '' };

  // Update header
  document.getElementById('convAvatar').textContent = (conv.nome || '?')[0].toUpperCase();
  document.getElementById('convName').textContent   = conv.nome;
  document.getElementById('convSub').textContent    = conv.telefone || conv.email || 'Cliente';
  document.getElementById('convOnlineDot').style.display = '';

  // Show/hide panels
  document.getElementById('chatEmpty').style.display = 'none';
  const convEl = document.getElementById('chatConv');
  convEl.style.display = 'flex';

  // Highlight in list
  renderClientList(conversations);

  // Load messages
  await loadMessages(clienteId);

  // Mark as read
  try { await markMessagesAsRead(clienteId, adminMode); } catch { /* ignore */ }

  // Clear unread badge for this conv
  const idx = conversations.findIndex(c => c.cliente_id === clienteId);
  if (idx !== -1) { conversations[idx].unread = 0; }
  const totalUnread = conversations.reduce((a, c) => a + c.unread, 0);
  updateChatBadge(totalUnread);

  // Subscribe to realtime updates for this thread
  if (realtimeSub) {
    try { realtimeSub.unsubscribe(); } catch { /* ignore */ }
  }
  realtimeSub = subscribeChat(clienteId, async (newMsg) => {
    appendMessage(newMsg, clienteId);
    scrollToBottom();
    // Auto-mark read if conv is active
    try { await markMessagesAsRead(clienteId, adminMode); } catch { /* ignore */ }
    // Update lastMsg in list
    const ci = conversations.findIndex(c => c.cliente_id === clienteId);
    if (ci !== -1) conversations[ci].lastMsg = newMsg.mensagem;
    renderClientList(conversations);
  });

  document.getElementById('msgInput')?.focus();
};

// ── Load messages ─────────────────────────────────────────────
async function loadMessages(clienteId) {
  const el = document.getElementById('chatMessages');
  el.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text3)"><i class="fas fa-circle-notch spin"></i></div>';
  try {
    const msgs = await getChatMessages(clienteId, 200);

    // Update lastMsg
    const ci = conversations.findIndex(c => c.cliente_id === clienteId);
    if (ci !== -1 && msgs.length) conversations[ci].lastMsg = msgs[msgs.length - 1].mensagem;

    if (!msgs.length) {
      el.innerHTML = `<div style="text-align:center;padding:30px;color:var(--text3);font-size:.84rem">
        <i class="fas fa-comment-dots" style="font-size:1.5rem;opacity:.3;display:block;margin-bottom:8px"></i>
        Nenhuma mensagem ainda. Diga olá! 👋
      </div>`;
      return;
    }

    el.innerHTML = '';
    let lastDate = '';
    msgs.forEach(msg => {
      const msgDate = new Date(msg.created_at).toLocaleDateString('pt-BR');
      if (msgDate !== lastDate) {
        lastDate = msgDate;
        const div = document.createElement('div');
        div.className = 'chat-date-divider';
        div.textContent = msgDate === new Date().toLocaleDateString('pt-BR') ? 'Hoje' :
          msgDate === new Date(Date.now()-86400000).toLocaleDateString('pt-BR') ? 'Ontem' : msgDate;
        el.appendChild(div);
      }
      appendMessage(msg, clienteId, false);
    });
    scrollToBottom(false);
  } catch (err) {
    el.innerHTML = `<div style="text-align:center;padding:20px;color:var(--danger);font-size:.82rem">
      <i class="fas fa-exclamation-circle"></i> Erro ao carregar: ${err.message}
    </div>`;
  }
}

// ── Append a single message bubble ───────────────────────────
function appendMessage(msg, clienteId, scroll = true) {
  const el = document.getElementById('chatMessages');
  if (!el) return;

  // Deduplication: skip if message with same id already rendered
  if (msg.id && el.querySelector(`[data-msg-id="${msg.id}"]`)) return;

  // Remove empty state if present
  const empty = el.querySelector('.chat-empty-state');
  if (empty) empty.remove();

  // isMine: admin sent (de_admin=true) when adminMode; or client sent (de_admin=false) when client
  const isMine = adminMode ? msg.de_admin : !msg.de_admin;

  // Sender name logic:
  // - Admin/atendente sees client name on their messages; shows staff name on admin messages
  // - Client sees "CRM" for admin messages (not individual staff name)
  let senderName;
  if (msg.de_admin) {
    // Message from admin/staff
    senderName = adminMode
      ? (msg.usuarios?.nome || 'Atendente')   // admin panel: show staff name
      : 'CRM';                                  // client view: show "CRM"
  } else {
    // Message from client
    senderName = conversations.find(c => c.cliente_id === clienteId)?.nome || 'Cliente';
  }
  const initial = (senderName || '?')[0].toUpperCase();

  const time = new Date(msg.created_at).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

  const row = document.createElement('div');
  row.className = `msg-row ${isMine ? 'mine' : 'theirs'}`;
  if (msg.id) row.dataset.msgId = msg.id;
  row.innerHTML = `
    <div class="msg-avatar">${msg.usuarios?.avatar_emote || initial}</div>
    <div>
      ${!isMine ? `<div style="font-size:.7rem;color:var(--text3);margin-bottom:2px;margin-left:2px">${senderName}</div>` : ''}
      <div class="msg-bubble">${escapeHtml(msg.mensagem)}</div>
      <div class="msg-meta">
        <span>${time}</span>
        ${isMine && msg.lida ? '<i class="fas fa-check-double" style="color:#10b981"></i>' : ''}
        ${isMine && !msg.lida ? '<i class="fas fa-check"></i>' : ''}
      </div>
    </div>`;
  el.appendChild(row);
  if (scroll) scrollToBottom();
}

function scrollToBottom(smooth = true) {
  const el = document.getElementById('chatMessages');
  if (!el) return;
  el.scrollTo({ top: el.scrollHeight, behavior: smooth ? 'smooth' : 'instant' });
}

function escapeHtml(s) {
  return (s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/\n/g, '<br>');
}

// ── Send message ──────────────────────────────────────────────
async function sendMessage() {
  if (!activeId) { showToast('Selecione uma conversa.', 'warning'); return; }
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if (!text) return;

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  try {
    input.value = '';
    autoResizeTA(input);
    const newMsg = await sendChatMessage(activeId, user.id, text, adminMode || staffMode);
    // Append message immediately (realtime sub may also fire but appendMessage is idempotent by id)
    if (newMsg) {
      appendMessage(newMsg, activeId);
      scrollToBottom();
      // Update lastMsg in list
      const ci = conversations.findIndex(c => c.cliente_id === activeId);
      if (ci !== -1) conversations[ci].lastMsg = newMsg.mensagem;
      renderClientList(conversations);
    }
  } catch (err) {
    showToast(err.message || 'Erro ao enviar mensagem.', 'error');
    input.value = text; // restore on error
  } finally {
    btn.disabled = false;
    input.focus();
  }
}

document.getElementById('sendBtn')?.addEventListener('click', sendMessage);
window.handleMsgKeydown = (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
};
window.autoResizeTA = (ta) => {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
};

// ── Mark read button ──────────────────────────────────────────
document.getElementById('btnMarkRead')?.addEventListener('click', async () => {
  if (!activeId) return;
  try {
    await markMessagesAsRead(activeId, adminMode);
    showToast('Mensagens marcadas como lidas.', 'success');
    await loadMessages(activeId);
  } catch (err) { showToast(err.message, 'error'); }
});

// ── Admin: search in sidebar ──────────────────────────────────
document.getElementById('searchCliente')?.addEventListener('input', function() {
  const q = this.value.toLowerCase();
  const filtered = q
    ? conversations.filter(c => c.nome.toLowerCase().includes(q) || c.email.toLowerCase().includes(q))
    : conversations;
  renderClientList(filtered);
});

// ── Admin: new conversation modal ────────────────────────────
document.getElementById('btnNewChat')?.addEventListener('click', async () => {
  // Load all clients for picking
  try {
    const all = await getAllClientes();
    allClientsMap = {};
    all.forEach(c => { allClientsMap[c.id] = c; });
    document.getElementById('pickSearch').value = '';
    renderPickList(all);
    document.getElementById('modalPickClient').classList.add('open');
  } catch (err) { showToast(err.message, 'error'); }
});
document.getElementById('closePickClient')?.addEventListener('click', () =>
  document.getElementById('modalPickClient').classList.remove('open'));

window.filterPickList = () => {
  const q = document.getElementById('pickSearch').value.toLowerCase();
  const all = Object.values(allClientsMap);
  renderPickList(q ? all.filter(c => (c.nome||'').toLowerCase().includes(q) || (c.email||'').toLowerCase().includes(q)) : all);
};

function renderPickList(list) {
  const el = document.getElementById('pickClientList');
  if (!list.length) {
    el.innerHTML = '<div style="text-align:center;padding:12px;color:var(--text3);font-size:.82rem">Nenhum cliente encontrado.</div>';
    return;
  }
  el.innerHTML = list.map(c => `
    <div class="pick-client-item" onclick="startConvWithClient('${c.id}','${escapeHtml(c.nome||'—')}','${c.telefone||''}','${c.email||''}')">
      <div class="chat-client-avatar" style="width:32px;height:32px;font-size:.75rem">${(c.nome||'?')[0].toUpperCase()}</div>
      <div>
        <div style="font-size:.84rem;font-weight:600">${c.nome || '—'}</div>
        <div style="font-size:.73rem;color:var(--text3)">${c.telefone || c.email || ''}</div>
      </div>
    </div>`).join('');
}

window.startConvWithClient = (id, nome, tel, email) => {
  document.getElementById('modalPickClient').classList.remove('open');
  // Add to conversations if not there
  if (!conversations.find(c => c.cliente_id === id)) {
    conversations.unshift({ cliente_id: id, nome, telefone: tel, email, lastMsg: '', unread: 0 });
    document.getElementById('totalConvs').textContent = `${conversations.length} conversa(s)`;
  }
  openConversation(id);
};

// ── URL param: open specific client ──────────────────────────
const urlClienteId = new URLSearchParams(location.search).get('cliente');

// ── Bootstrap ────────────────────────────────────────────────
await loadConversations();

if (urlClienteId) {
  setTimeout(() => openConversation(urlClienteId), 200);
}

// ── Auto-refresh unread counts every 60s ─────────────────────
setInterval(async () => {
  if (!adminMode) return;
  for (const conv of conversations) {
    try {
      const msgs = await getChatMessages(conv.cliente_id, 1000);
      conv.unread  = msgs.filter(m => !m.de_admin && !m.lida).length;
      conv.lastMsg = msgs[msgs.length - 1]?.mensagem || conv.lastMsg;
    } catch { /* skip */ }
  }
  const totalUnread = conversations.reduce((a, c) => a + c.unread, 0);
  updateChatBadge(totalUnread);
  if (document.getElementById('searchCliente')?.value === '') renderClientList(conversations);
}, 60000);

document.addEventListener('visibilitychange', () => {
  if (!document.hidden && activeId) {
    loadMessages(activeId).catch(() => {});
  }
});

</script>
</body>
</html>
