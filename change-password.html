<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Redefinir Senha — CRM Agendamentos</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="page-loader" id="pageLoader">
  <div class="loader-ring"></div>
  <p style="color:var(--text2);font-size:.85rem">Aguarde…</p>
</div>

<div class="auth-page">
  <div class="auth-container">
    <div class="auth-logo">
      <div class="auth-logo-icon">🔐</div>
      <h1>CRM Agendamentos</h1>
      <p>Redefinição de senha</p>
    </div>

    <div class="auth-box" id="mainBox">
      <h2>Nova Senha</h2>
      <p>Escolha uma senha segura para sua conta</p>

      <div class="error-msg" id="errorMsg"><i class="fas fa-exclamation-circle"></i><span></span></div>

      <div class="form-group">
        <label>Nova Senha</label>
        <div class="input-group" style="position:relative">
          <i class="fas fa-lock"></i>
          <input type="password" id="newPassword" placeholder="Mínimo 6 caracteres"/>
          <button class="toggle-password" id="toggleNew" type="button">
            <i class="fas fa-eye" id="eyeNew"></i>
          </button>
        </div>
        <div id="pwdStrengthWrap" style="margin-top:6px;display:none">
          <div style="display:flex;gap:4px;margin-bottom:4px">
            <div style="flex:1;height:4px;border-radius:2px;background:var(--border)" id="bar1"></div>
            <div style="flex:1;height:4px;border-radius:2px;background:var(--border)" id="bar2"></div>
            <div style="flex:1;height:4px;border-radius:2px;background:var(--border)" id="bar3"></div>
            <div style="flex:1;height:4px;border-radius:2px;background:var(--border)" id="bar4"></div>
          </div>
          <span id="pwdStrengthLabel" style="font-size:.72rem;color:var(--text2)"></span>
        </div>
      </div>

      <div class="form-group">
        <label>Confirmar Nova Senha</label>
        <div class="input-group" style="position:relative">
          <i class="fas fa-lock"></i>
          <input type="password" id="confirmPassword" placeholder="Repita a nova senha"/>
          <button class="toggle-password" id="toggleConfirm" type="button">
            <i class="fas fa-eye" id="eyeConfirm"></i>
          </button>
        </div>
        <div class="field-hint" id="confirmHint"></div>
      </div>

      <button class="btn btn-primary w-full" id="saveBtn">
        <i class="fas fa-save"></i> Salvar Nova Senha
      </button>

      <p style="text-align:center;margin-top:16px;font-size:.82rem;color:var(--text2)">
        <a href="index.html" class="auth-link"><i class="fas fa-arrow-left"></i> Voltar ao login</a>
      </p>
    </div>

    <!-- Sucesso -->
    <div class="auth-box" id="successBox" style="display:none;text-align:center">
      <i class="fas fa-check-circle" style="font-size:3rem;color:var(--secondary);margin-bottom:16px;display:block"></i>
      <h2>Senha atualizada!</h2>
      <p style="margin-bottom:24px">Sua senha foi redefinida com sucesso. Você já pode fazer login.</p>
      <a href="index.html" class="btn btn-primary w-full">
        <i class="fas fa-sign-in-alt"></i> Ir para o Login
      </a>
    </div>

    <p style="text-align:center;margin-top:20px;font-size:.75rem;color:var(--text3)">
      CRM Agendamentos v1.0 · Powered by Supabase
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
import { sb } from './supabase/client.js';
import { showToast } from './supabase/session-manager.js';

window.addEventListener('load', () => {
  setTimeout(() => document.getElementById('pageLoader')?.classList.add('hide'), 600);
});

// Verifica se há sessão de redefinição
sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    // Usuário chegou pelo link de redefinição — exibe o form normalmente
    document.getElementById('pageLoader')?.classList.add('hide');
  }
});

// Toggle passwords
function togglePwd(inputId, iconId) {
  const input = document.getElementById(inputId);
  const icon  = document.getElementById(iconId);
  if (!input || !icon) return;
  input.type = input.type === 'password' ? 'text' : 'password';
  icon.className = input.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
}
document.getElementById('toggleNew')?.addEventListener('click', () => togglePwd('newPassword','eyeNew'));
document.getElementById('toggleConfirm')?.addEventListener('click', () => togglePwd('confirmPassword','eyeConfirm'));

// Força da senha
document.getElementById('newPassword')?.addEventListener('input', (e) => {
  const val  = e.target.value;
  const wrap = document.getElementById('pwdStrengthWrap');
  wrap.style.display = val ? 'block' : 'none';
  let score = 0;
  if (val.length >= 6)  score++;
  if (val.length >= 10) score++;
  if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  score = Math.min(4, score);
  const colors = ['#ef4444','#f59e0b','#f59e0b','#10b981','#10b981'];
  const labels = ['Muito fraca','Fraca','Regular','Boa','Forte'];
  for (let i = 1; i <= 4; i++) {
    const bar = document.getElementById(`bar${i}`);
    if (bar) bar.style.background = i <= score ? colors[score] : 'var(--border)';
  }
  const lbl = document.getElementById('pwdStrengthLabel');
  if (lbl) { lbl.textContent = labels[score]; lbl.style.color = colors[score]; }
});

// Confirmar senha
document.getElementById('confirmPassword')?.addEventListener('input', () => {
  const pwd  = document.getElementById('newPassword')?.value;
  const conf = document.getElementById('confirmPassword')?.value;
  const hint = document.getElementById('confirmHint');
  if (!hint || !conf) return;
  hint.textContent = pwd === conf ? '✓ Senhas conferem' : '✗ Senhas não conferem';
  hint.className   = `field-hint ${pwd === conf ? 'ok' : 'err'}`;
});

// Salvar nova senha
document.getElementById('saveBtn')?.addEventListener('click', async () => {
  const errorEl  = document.getElementById('errorMsg');
  const pwd      = document.getElementById('newPassword')?.value;
  const confirm  = document.getElementById('confirmPassword')?.value;

  errorEl.classList.remove('show');

  if (!pwd || pwd.length < 6) {
    errorEl.classList.add('show');
    errorEl.querySelector('span').textContent = 'Senha deve ter pelo menos 6 caracteres.';
    return;
  }
  if (pwd !== confirm) {
    errorEl.classList.add('show');
    errorEl.querySelector('span').textContent = 'As senhas não conferem.';
    return;
  }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-circle-notch spin"></i> Salvando…';

  try {
    const { error } = await sb.auth.updateUser({ password: pwd });
    if (error) throw error;
    document.getElementById('mainBox').style.display    = 'none';
    document.getElementById('successBox').style.display = 'block';
    showToast('Senha atualizada com sucesso!', 'success');
  } catch (err) {
    errorEl.classList.add('show');
    errorEl.querySelector('span').textContent = err.message || 'Erro ao atualizar senha.';
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-save"></i> Salvar Nova Senha';
  }
});
</script>
</body>
</html>
