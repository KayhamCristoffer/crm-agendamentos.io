<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clientes — CRM</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="page-loader" id="pageLoader"><div class="loader-ring"></div></div>
<div id="sidebarMount"></div>

<div class="app-layout">
  <div class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        <div class="topbar-title"><h1>Clientes</h1><p>Gerencie sua base de clientes</p></div>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-ghost btn-sm" id="btnRefresh" title="Atualizar">
          <i class="fas fa-sync-alt"></i> <span id="refreshCountdown">30s</span>
        </button>
        <div class="view-toggle">
          <button class="view-btn active" id="viewGrid" title="Cards"><i class="fas fa-th-large"></i></button>
          <button class="view-btn" id="viewList" title="Lista"><i class="fas fa-list"></i></button>
        </div>
        <button class="btn btn-primary btn-sm" id="btnNovoCliente">
          <i class="fas fa-user-plus"></i> Novo Cliente
        </button>
      </div>
    </div>

    <div class="page-content">
      <div class="filter-bar">
        <div class="search-input-wrap">
          <i class="fas fa-search"></i>
          <input class="search-input" type="text" id="searchInput" placeholder="Nome, e-mail, telefone ou CPF…"/>
        </div>
        <select id="filterOrdem" class="btn btn-ghost btn-sm" style="border:1px solid var(--border)">
          <option value="nome">Ordenar: Nome</option>
          <option value="visitas">Ordenar: Visitas</option>
          <option value="gasto">Ordenar: Total Gasto</option>
          <option value="recente">Ordenar: Recente</option>
        </select>
        <button class="btn btn-ghost btn-sm" id="clearFilters"><i class="fas fa-times"></i> Limpar</button>
        <span id="contadorClientes" style="margin-left:auto;font-size:.8rem;color:var(--text2)"></span>
      </div>

      <div class="client-list-grid" id="clienteGrid"></div>

      <div id="clienteTable" style="display:none">
        <div class="table-container">
          <table>
            <thead><tr>
              <th>Nome</th><th>Telefone</th><th>E-mail</th>
              <th>Visitas</th><th>Total Gasto</th><th>Última Visita</th><th>Ações</th>
            </tr></thead>
            <tbody id="tbodyClientes"></tbody>
          </table>
        </div>
      </div>
      <div id="paginacao" class="pagination"></div>
    </div>
  </div>
</div>

<!-- ── MODAL CLIENTE ── -->
<div class="modal-overlay" id="modalCliente">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3 id="modalClienteTitle"><i class="fas fa-user-plus"></i> Novo Cliente</h3>
      <button class="modal-close" id="closeModalCliente"><i class="fas fa-times"></i></button>
    </div>
    <div class="form-row form-row-2">
      <div class="form-group">
        <label>Nome completo *</label>
        <input type="text" id="cNome" placeholder="João da Silva"/>
      </div>
      <div class="form-group">
        <label>Telefone <small style="color:var(--text3)">(XX) XXXXX-XXXX</small></label>
        <input type="tel" id="cTelefone" placeholder="(XX) XXXXX-XXXX" maxlength="15"/>
      </div>
    </div>
    <div class="form-row form-row-2">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="cEmail" placeholder="joao@email.com"/>
      </div>
      <div class="form-group">
        <label>CPF <small style="color:var(--text3)">XXX.XXX.XXX-XX</small></label>
        <input type="text" id="cCpf" placeholder="XXX.XXX.XXX-XX" maxlength="14"/>
      </div>
    </div>
    <div class="form-row form-row-2">
      <div class="form-group">
        <label>Data de Nascimento</label>
        <input type="date" id="cNascimento"/>
      </div>
      <div class="form-group">
        <label>Cidade</label>
        <input type="text" id="cCidade" placeholder="São Paulo"/>
      </div>
    </div>
    <div class="form-group">
      <label>Endereço</label>
      <input type="text" id="cEndereco" placeholder="Rua, número, bairro"/>
    </div>
    <div class="form-group">
      <label>Tags <small style="color:var(--text3)">(separadas por vírgula)</small></label>
      <input type="text" id="cTags" placeholder="vip, frequente, indicação"/>
    </div>
    <div class="form-group">
      <label>Observações</label>
      <textarea id="cObs" placeholder="Informações importantes sobre o cliente…" rows="3"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cancelModalCliente">Cancelar</button>
      <button class="btn btn-primary" id="salvarCliente"><i class="fas fa-save"></i> Salvar</button>
    </div>
  </div>
</div>

<!-- ── MODAL PERFIL CLIENTE ── -->
<div class="modal-overlay" id="modalPerfil">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3><i class="fas fa-user"></i> Perfil do Cliente</h3>
      <button class="modal-close" id="closeModalPerfil"><i class="fas fa-times"></i></button>
    </div>
    <div id="perfilContent"></div>
    <div class="modal-footer" id="perfilFooter"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
import { requireAuth, renderUserInSidebar, showToast, isAdmin, isStaff } from './supabase/session-manager.js';
import {
  getAllClientes, getCliente, createCliente, updateCliente, deleteCliente,
  getAllAgendamentos, formatCurrency, formatDate, formatDateTime, STATUS_LABELS,
  applyPhoneMask, applyCPFMask, formatPhone, formatCPF
} from './supabase/database.js';
import { getSidebarHTML, initSidebarToggle, showAdminItems, showStaffItems } from './js/sidebar.js';

document.getElementById('sidebarMount').innerHTML = getSidebarHTML('clientes');
initSidebarToggle();
const auth = await requireAuth();
if (!auth) throw new Error('Not authenticated');
const { user, profile } = auth;
const adminMode = isAdmin(user, profile);
const staffMode = isStaff(user, profile);
// Clientes não têm acesso → redirecionar para dashboard
if (!staffMode) {
  showToast('Acesso restrito. Redirecionando…', 'warning');
  setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
  throw new Error('Acesso negado: cliente');
}
renderUserInSidebar(profile);
if (adminMode) showAdminItems();
else if (staffMode) showStaffItems();
setTimeout(() => document.getElementById('pageLoader')?.classList.add('hide'), 400);
document.getElementById('logoutBtn')?.addEventListener('click', () =>
  import('./supabase/database.js').then(m => m.signOut()).then(() => window.location.href='index.html'));

// Apply masks
applyPhoneMask(document.getElementById('cTelefone'));
applyCPFMask(document.getElementById('cCpf'));

// ── Auto-refresh every 30s ────────────────────────────────────
let countdown = 30;
const countdownEl = document.getElementById('refreshCountdown');
function tickCountdown() {
  countdown--;
  if (countdownEl) countdownEl.textContent = countdown + 's';
  if (countdown <= 0) { countdown = 30; loadClientes(); }
}
let countdownTimer = setInterval(tickCountdown, 1000);

document.getElementById('btnRefresh')?.addEventListener('click', () => {
  clearInterval(countdownTimer);
  countdown = 30;
  if (countdownEl) countdownEl.textContent = '30s';
  showToast('Atualizando…','info',1500);
  loadClientes();
  countdownTimer = setInterval(tickCountdown, 1000);
});

document.addEventListener('visibilitychange', () => {
  if (document.hidden) clearInterval(countdownTimer);
  else { countdown = 30; loadClientes(); countdownTimer = setInterval(tickCountdown, 1000); }
});

let allClientes = [], filteredClientes = [], viewMode = 'grid';
let currentPage = 1, perPage = 24, editingId = null, viewingId = null;

async function loadClientes() {
  try {
    allClientes = await getAllClientes();
    applyFilters();
  } catch(err) {
    showToast('Erro ao carregar clientes.','error');
  }
}

function applyFilters() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const ordem  = document.getElementById('filterOrdem').value;
  filteredClientes = allClientes.filter(c => {
    if (!search) return true;
    return [c.nome,c.email,c.telefone,c.cpf].join(' ').toLowerCase().includes(search);
  });
  filteredClientes.sort((a,b) => {
    if (ordem==='visitas') return (b.total_visitas||0)-(a.total_visitas||0);
    if (ordem==='gasto')   return (b.total_gasto||0)-(a.total_gasto||0);
    if (ordem==='recente') return new Date(b.created_at)-new Date(a.created_at);
    return (a.nome||'').localeCompare(b.nome||'');
  });
  currentPage = 1;
  document.getElementById('contadorClientes').textContent = `${filteredClientes.length} cliente(s)`;
  render();
}

function render() {
  const start = (currentPage-1)*perPage;
  const page  = filteredClientes.slice(start, start+perPage);
  if (viewMode === 'grid') renderGrid(page);
  else renderTable(page);
  renderPagination();
}

function getInitials(nome) {
  return (nome||'?').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();
}

function renderGrid(items) {
  const el = document.getElementById('clienteGrid');
  el.style.display = '';
  document.getElementById('clienteTable').style.display = 'none';
  if (!items.length) {
    el.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <i class="fas fa-users"></i><h3>Nenhum cliente encontrado</h3>
      <p>${adminMode?'Clique em "Novo Cliente" para adicionar.':'Nenhum cliente disponível.'}</p>
    </div>`;
    return;
  }
  el.innerHTML = items.map(c => `
    <div class="client-card">
      <div style="display:flex;align-items:flex-start;gap:12px">
        <div class="client-avatar" style="background:var(--primary)">${getInitials(c.nome)}</div>
        <div style="flex:1;min-width:0">
          <h4 style="font-size:.92rem;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.nome}</h4>
          ${c.telefone?`<div style="font-size:.74rem;color:var(--text2)"><i class="fas fa-phone" style="color:var(--primary-light)"></i> ${formatPhone(c.telefone)}</div>`:''}
          ${c.email?`<div style="font-size:.74rem;color:var(--text2);overflow:hidden;text-overflow:ellipsis"><i class="fas fa-envelope" style="color:var(--primary-light)"></i> ${c.email}</div>`:''}
          ${c.cpf?`<div style="font-size:.72rem;color:var(--text3)"><i class="fas fa-id-card"></i> ${formatCPF(c.cpf)}</div>`:''}
        </div>
      </div>
      ${c.tags?.length?`<div style="margin-top:8px;display:flex;gap:4px;flex-wrap:wrap">${c.tags.map(t=>`<span class="badge badge-info" style="font-size:.65rem">${t}</span>`).join('')}</div>`:''}
      <div class="client-card-stats">
        <div class="client-stat-item"><strong>${c.total_visitas||0}</strong><small>Visitas</small></div>
        <div class="client-stat-item"><strong>${formatCurrency(c.total_gasto||0)}</strong><small>Total gasto</small></div>
        <div class="client-stat-item"><strong>${c.ultima_visita?formatDate(c.ultima_visita):'—'}</strong><small>Última visita</small></div>
      </div>
      <div class="client-card-actions">
        <button class="btn btn-ghost btn-sm" onclick="verPerfil('${c.id}')"><i class="fas fa-eye"></i> Ver</button>
        ${adminMode?`
        <button class="btn btn-ghost btn-sm" onclick="editarCliente('${c.id}')"><i class="fas fa-edit"></i> Editar</button>
        <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="excluirCliente('${c.id}')"><i class="fas fa-trash"></i></button>`:''}
        <a href="agendamentos.html?cliente=${c.id}" class="btn btn-primary btn-sm"><i class="fas fa-calendar-plus"></i> Agendar</a>
      </div>
    </div>`).join('');
}

function renderTable(items) {
  document.getElementById('clienteGrid').style.display = 'none';
  document.getElementById('clienteTable').style.display = '';
  const tbody = document.getElementById('tbodyClientes');
  if (!items.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><i class="fas fa-users"></i><h3>Nenhum cliente</h3></div></td></tr>`;
    return;
  }
  tbody.innerHTML = items.map(c => `
    <tr>
      <td><div style="display:flex;align-items:center;gap:10px">
        <div class="client-avatar-sm">${getInitials(c.nome)}</div>
        <div>
          <strong>${c.nome}</strong>
          ${c.cpf?`<br><small style="color:var(--text3)">${formatCPF(c.cpf)}</small>`:''}
        </div>
      </div></td>
      <td>${c.telefone?formatPhone(c.telefone):'—'}</td>
      <td>${c.email||'—'}</td>
      <td>${c.total_visitas||0}</td>
      <td>${formatCurrency(c.total_gasto||0)}</td>
      <td>${c.ultima_visita?formatDate(c.ultima_visita):'—'}</td>
      <td class="td-actions">
        <button class="btn btn-ghost btn-sm btn-icon" onclick="verPerfil('${c.id}')"><i class="fas fa-eye"></i></button>
        ${adminMode?`
        <button class="btn btn-ghost btn-sm btn-icon" onclick="editarCliente('${c.id}')"><i class="fas fa-edit"></i></button>
        <button class="btn btn-ghost btn-sm btn-icon" style="color:var(--danger)" onclick="excluirCliente('${c.id}')"><i class="fas fa-trash"></i></button>`:''}
        <a href="agendamentos.html?cliente=${c.id}" class="btn btn-primary btn-sm"><i class="fas fa-calendar-plus"></i></a>
      </td>
    </tr>`).join('');
}

function renderPagination() {
  const total = Math.ceil(filteredClientes.length / perPage);
  const el = document.getElementById('paginacao');
  if (total <= 1) { el.innerHTML=''; return; }
  el.innerHTML = `
    <button class="btn btn-ghost btn-sm" onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>
      <i class="fas fa-chevron-left"></i>
    </button>
    <span style="padding:0 12px;font-size:.84rem">Página ${currentPage} de ${total}</span>
    <button class="btn btn-ghost btn-sm" onclick="goPage(${currentPage+1})" ${currentPage>=total?'disabled':''}>
      <i class="fas fa-chevron-right"></i>
    </button>`;
}

window.goPage = (p) => {
  currentPage = p;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
};

// ── View toggle ───────────────────────────────────────────────
document.getElementById('viewGrid')?.addEventListener('click', () => {
  viewMode = 'grid';
  document.getElementById('viewGrid').classList.add('active');
  document.getElementById('viewList').classList.remove('active');
  render();
});
document.getElementById('viewList')?.addEventListener('click', () => {
  viewMode = 'list';
  document.getElementById('viewList').classList.add('active');
  document.getElementById('viewGrid').classList.remove('active');
  render();
});

// ── Filters ───────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('filterOrdem').addEventListener('change', applyFilters);
document.getElementById('clearFilters')?.addEventListener('click', () => {
  document.getElementById('searchInput').value = '';
  document.getElementById('filterOrdem').value = 'nome';
  applyFilters();
});

// ── Ver Perfil (view-only, com histórico) ─────────────────────
window.verPerfil = async (id) => {
  viewingId = id;
  const el = document.getElementById('perfilContent');
  const ftr = document.getElementById('perfilFooter');
  el.innerHTML = '<div class="loading"><i class="fas fa-circle-notch spin"></i> Carregando…</div>';
  document.getElementById('modalPerfil').classList.add('open');

  try {
    const [c, ags] = await Promise.all([
      getCliente(id),
      getAllAgendamentos({ cliente_id: id, limit: 30 })
    ]);

    el.innerHTML = `
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
        <div class="client-avatar" style="width:56px;height:56px;font-size:1.2rem;background:var(--primary)">${getInitials(c.nome)}</div>
        <div>
          <h3 style="font-size:1.1rem;font-weight:800">${c.nome}</h3>
          ${c.email?`<div style="font-size:.8rem;color:var(--text2)">${c.email}</div>`:''}
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:20px">
        <div class="stat-card" style="padding:12px">
          <div class="stat-info"><label>Telefone</label><h3 style="font-size:.9rem">${c.telefone?formatPhone(c.telefone):'—'}</h3></div>
        </div>
        <div class="stat-card" style="padding:12px">
          <div class="stat-info"><label>CPF</label><h3 style="font-size:.9rem">${c.cpf?formatCPF(c.cpf):'—'}</h3></div>
        </div>
        <div class="stat-card" style="padding:12px">
          <div class="stat-info"><label>Visitas</label><h3>${c.total_visitas||0}</h3></div>
        </div>
        <div class="stat-card" style="padding:12px">
          <div class="stat-info"><label>Total gasto</label><h3 style="font-size:.9rem">${formatCurrency(c.total_gasto||0)}</h3></div>
        </div>
      </div>
      ${c.cidade||c.endereco?`<p style="font-size:.8rem;color:var(--text2);margin-bottom:16px"><i class="fas fa-map-marker-alt"></i> ${[c.endereco,c.cidade].filter(Boolean).join(', ')}</p>`:''}
      ${c.tags?.length?`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">${c.tags.map(t=>`<span class="badge badge-info">${t}</span>`).join('')}</div>`:''}
      ${c.observacoes?`<div style="background:var(--bg3);border-radius:8px;padding:12px;font-size:.82rem;color:var(--text2);margin-bottom:16px"><i class="fas fa-sticky-note"></i> ${c.observacoes}</div>`:''}

      <div style="font-weight:700;font-size:.88rem;margin-bottom:10px">
        <i class="fas fa-history" style="color:var(--primary-light)"></i> Histórico de Agendamentos (${ags.length})
      </div>
      ${ags.length===0
        ? '<div class="empty-state" style="padding:24px 0"><i class="fas fa-calendar"></i><h3>Sem agendamentos</h3></div>'
        : `<div class="table-container" style="max-height:260px;overflow-y:auto"><table>
            <thead><tr><th>Data</th><th>Serviços</th><th>Profissional</th><th>Total</th><th>Status</th></tr></thead>
            <tbody>${ags.map(ag => {
              const st = STATUS_LABELS[ag.status]||{};
              const svcs = ag.agendamento_servicos?.map(s=>s.servicos?.nome||'').filter(Boolean).join(', ')||'—';
              const prof = ag.agendamento_servicos?.[0]?.equipe?.nome||'—';
              return `<tr>
                <td>${formatDateTime(ag.data_hora)}</td>
                <td>${svcs}</td>
                <td>${prof}</td>
                <td><strong>${formatCurrency(ag.valor_total||0)}</strong></td>
                <td><span class="badge" style="background:${st.color}22;color:${st.color}">${st.icon||''} ${st.label||ag.status}</span></td>
              </tr>`;
            }).join('')}</tbody>
          </table></div>`}`;

    ftr.innerHTML = `
      ${adminMode?`<button class="btn btn-secondary" onclick="editarCliente('${id}');closeModalPerfil()"><i class="fas fa-edit"></i> Editar</button>`:''}
      <a href="agendamentos.html?cliente=${id}" class="btn btn-primary"><i class="fas fa-calendar-plus"></i> Novo Agendamento</a>`;
  } catch (err) {
    el.innerHTML = `<p style="color:var(--danger)">Erro: ${err.message}</p>`;
  }
};

window.closeModalPerfil = () => document.getElementById('modalPerfil').classList.remove('open');
document.getElementById('closeModalPerfil')?.addEventListener('click', () => closeModalPerfil());

// ── Editar / Criar cliente ────────────────────────────────────
window.editarCliente = async (id) => {
  editingId = id;
  const c = allClientes.find(x=>x.id===id) || await getCliente(id);
  document.getElementById('modalClienteTitle').innerHTML = '<i class="fas fa-edit"></i> Editar Cliente';
  document.getElementById('cNome').value      = c.nome||'';
  document.getElementById('cTelefone').value  = c.telefone||'';
  document.getElementById('cEmail').value     = c.email||'';
  document.getElementById('cCpf').value       = c.cpf?formatCPF(c.cpf):'';
  document.getElementById('cNascimento').value= c.data_nascimento||'';
  document.getElementById('cCidade').value    = c.cidade||'';
  document.getElementById('cEndereco').value  = c.endereco||'';
  document.getElementById('cTags').value      = c.tags?.join(', ')||'';
  document.getElementById('cObs').value       = c.observacoes||'';
  document.getElementById('modalCliente').classList.add('open');
};

document.getElementById('btnNovoCliente')?.addEventListener('click', () => {
  if (!adminMode) { showToast('Apenas administradores podem criar clientes.','warning'); return; }
  editingId = null;
  document.getElementById('modalClienteTitle').innerHTML = '<i class="fas fa-user-plus"></i> Novo Cliente';
  ['cNome','cTelefone','cEmail','cCpf','cCidade','cEndereco','cTags','cObs'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('cNascimento').value = '';
  document.getElementById('modalCliente').classList.add('open');
});

document.getElementById('closeModalCliente')?.addEventListener('click', () =>
  document.getElementById('modalCliente').classList.remove('open'));
document.getElementById('cancelModalCliente')?.addEventListener('click', () =>
  document.getElementById('modalCliente').classList.remove('open'));

document.getElementById('salvarCliente')?.addEventListener('click', async () => {
  const nome = document.getElementById('cNome').value.trim();
  if (!nome) { showToast('Informe o nome do cliente.','warning'); return; }
  const btn = document.getElementById('salvarCliente'); btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-circle-notch spin"></i> Salvando…';
  try {
    // Strip formatting from phone/CPF before saving
    const telRaw = document.getElementById('cTelefone').value.replace(/\D/g,'');
    const cpfRaw = document.getElementById('cCpf').value.replace(/\D/g,'');
    const tagsRaw = document.getElementById('cTags').value.split(',').map(t=>t.trim()).filter(Boolean);

    const payload = {
      nome,
      telefone:        telRaw ? telRaw.length===11 ? `(${telRaw.slice(0,2)}) ${telRaw.slice(2,7)}-${telRaw.slice(7)}` : `(${telRaw.slice(0,2)}) ${telRaw.slice(2,6)}-${telRaw.slice(6)}` : null,
      email:           document.getElementById('cEmail').value||null,
      cpf:             cpfRaw||null,
      data_nascimento: document.getElementById('cNascimento').value||null,
      cidade:          document.getElementById('cCidade').value||null,
      endereco:        document.getElementById('cEndereco').value||null,
      tags:            tagsRaw.length ? tagsRaw : null,
      observacoes:     document.getElementById('cObs').value||null,
    };

    if (editingId) {
      await updateCliente(editingId, payload);
      showToast('Cliente atualizado!','success');
    } else {
      // Set criado_por for new clients
      const { data:{ user: u } } = await import('./supabase/client.js').then(m=>m.sb.auth.getUser());
      await createCliente({ ...payload, criado_por: u?.id||null });
      showToast('Cliente cadastrado!','success');
    }
    document.getElementById('modalCliente').classList.remove('open');
    await loadClientes();
  } catch (err) {
    showToast(err.message||'Erro ao salvar cliente.','error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-save"></i> Salvar';
  }
});

window.excluirCliente = async (id) => {
  if (!adminMode) { showToast('Sem permissão.','warning'); return; }
  const c = allClientes.find(x=>x.id===id);
  if (!confirm(`Remover "${c?.nome}"? O cliente será marcado como inativo.`)) return;
  try {
    await deleteCliente(id);
    showToast('Cliente removido.','success');
    await loadClientes();
  } catch (err) { showToast(err.message,'error'); }
};

// ── Check URL params ──────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
if (params.get('action') === 'novo' && adminMode) {
  document.getElementById('btnNovoCliente')?.click();
}

await loadClientes();
</script>
</body>
</html>
