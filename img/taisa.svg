<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#9333ea"/>
    </linearGradient>
    <radialGradient id="face" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#fde8d8"/>
      <stop offset="100%" style="stop-color:#f8c8a8"/>
    </radialGradient>
  </defs>
  <!-- background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <!-- hair (back) -->
  <ellipse cx="100" cy="72" rx="42" ry="44" fill="#6b21a8"/>
  <!-- neck -->
  <rect x="88" y="122" width="24" height="26" rx="8" fill="url(#face)"/>
  <!-- face -->
  <circle cx="100" cy="85" r="36" fill="url(#face)"/>
  <!-- hair (top + sides) -->
  <path d="M58 85 Q60 42 100 40 Q140 42 142 85 Q138 58 100 56 Q62 58 58 85Z" fill="#6b21a8"/>
  <!-- hair highlights -->
  <path d="M65 75 Q80 50 100 48" stroke="#a855f7" stroke-width="3" fill="none" opacity="0.6"/>
  <!-- eyes -->
  <ellipse cx="87" cy="82" rx="5" ry="5.5" fill="#2d1b69"/>
  <ellipse cx="113" cy="82" rx="5" ry="5.5" fill="#2d1b69"/>
  <circle cx="88.5" cy="80.5" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="114.5" cy="80.5" r="1.5" fill="#fff" opacity="0.8"/>
  <!-- eyebrows -->
  <path d="M80 75 Q87 72 94 75" stroke="#4c1d95" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M106 75 Q113 72 120 75" stroke="#4c1d95" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- nose -->
  <path d="M97 89 Q100 94 103 89" stroke="#d4956a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- smile -->
  <path d="M89 97 Q100 105 111 97" stroke="#c2715c" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- cheeks blush -->
  <ellipse cx="80" cy="93" rx="9" ry="5" fill="#f9a8d4" opacity="0.5"/>
  <ellipse cx="120" cy="93" rx="9" ry="5" fill="#f9a8d4" opacity="0.5"/>
  <!-- body / shirt -->
  <path d="M55 200 Q60 145 80 135 Q90 130 100 130 Q110 130 120 135 Q140 145 145 200Z" fill="#9333ea"/>
  <!-- collar -->
  <path d="M88 132 L100 148 L112 132" stroke="#f0abfc" stroke-width="2" fill="none"/>
</svg>
