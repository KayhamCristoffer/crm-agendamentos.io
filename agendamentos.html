<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agendamentos — CRM</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    /* ── Heatmap ── */
    .heatmap-grid { display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin:8px 0; }
    .heatmap-labels { display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px; }
    .heatmap-labels span { text-align:center;font-size:.65rem;color:var(--text3);font-weight:700;text-transform:uppercase; }
    .heatmap-day {
      aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;
      font-size:.72rem;font-weight:600;cursor:pointer;transition:.15s;border:2px solid transparent;
    }
    .heatmap-day:hover:not(.empty):not(.closed):not(.past) { border-color:var(--primary); }
    .heatmap-day.empty  { background:transparent;cursor:default;border:none; }
    .heatmap-day.heat-0 { background:var(--bg3);color:var(--text3); }
    .heatmap-day.heat-1 { background:rgba(99,102,241,.18);color:#a5b4fc; }
    .heatmap-day.heat-2 { background:rgba(99,102,241,.38);color:#c7d2fe; }
    .heatmap-day.heat-3 { background:rgba(99,102,241,.62);color:#e0e7ff; }
    .heatmap-day.heat-4 { background:rgba(99,102,241,.88);color:#fff; }
    .heatmap-day.today  { box-shadow:0 0 0 2px var(--secondary); }
    .heatmap-day.past   { opacity:.4;cursor:not-allowed; }
    .heatmap-day.closed {
      background:repeating-linear-gradient(45deg,var(--bg3) 0,var(--bg3) 2px,transparent 2px,transparent 6px);
      color:var(--text3);cursor:not-allowed;
    }
    .heatmap-day.selected { border-color:var(--secondary) !important;box-shadow:0 0 0 2px var(--secondary); }

    /* ── Slots ── */
    .cal-slots-layout { display:grid;grid-template-columns:1fr 280px;gap:16px;align-items:start; }
    @media(max-width:700px){ .cal-slots-layout { grid-template-columns:1fr; } }
    .slots-panel {
      background:var(--bg3);border:1px solid var(--border);border-radius:12px;
      padding:14px;min-height:200px;
    }
    .slots-panel h4 { font-size:.82rem;font-weight:700;margin-bottom:10px;color:var(--text); }
    .slot-item {
      display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;
      margin-bottom:5px;cursor:pointer;transition:.15s;border:1px solid transparent;
      font-size:.82rem;
    }
    .slot-item.livre  { background:var(--bg);border-color:var(--border); }
    .slot-item.livre:hover  { border-color:var(--primary);background:rgba(99,102,241,.08); }
    .slot-item.livre.selected { background:var(--primary);color:#fff;border-color:var(--primary); }
    .slot-item.ocupado {
      background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.2);
      cursor:not-allowed;opacity:.75;
    }
    .slot-dot { width:9px;height:9px;border-radius:50%;flex-shrink:0; }
    .slot-hora { font-weight:700;min-width:44px; }
    .slot-info { font-size:.74rem;color:var(--text2);flex:1; }
    .slot-item.livre.selected .slot-info { color:rgba(255,255,255,.8); }

    /* ── Service rows ── */
    .svc-row {
      background:var(--bg3);border:1px solid var(--border);border-radius:10px;
      padding:13px;margin-bottom:9px;
    }
    .prod-row {
      background:var(--bg3);border:1px solid var(--border);border-radius:10px;
      padding:11px;margin-bottom:8px;
      display:grid;grid-template-columns:1fr 90px auto;gap:8px;align-items:end;
    }
  </style>
</head>
<body>
<div class="page-loader" id="pageLoader"><div class="loader-ring"></div></div>
<div id="sidebarMount"></div>
<div class="app-layout">
  <div class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        <div class="topbar-title"><h1>Agendamentos</h1><p>Gerencie os atendimentos</p></div>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-ghost btn-sm" id="btnRefresh">
          <i class="fas fa-sync-alt"></i> <span id="refreshCountdown">30s</span>
        </button>
        <button class="btn btn-primary btn-sm" id="btnNovo">
          <i class="fas fa-plus"></i> Novo
        </button>
      </div>
    </div>

    <div class="page-content">
      <div class="tabs">
        <button class="tab-btn active" data-tab="lista">📋 Lista</button>
        <button class="tab-btn" data-tab="calendario">📅 Calendário</button>
      </div>

      <!-- TAB LISTA -->
      <div class="tab-content active" id="tab-lista">
        <div class="filter-bar mb-16">
          <div class="search-input-wrap">
            <i class="fas fa-search"></i>
            <input class="search-input" type="text" id="searchInput" placeholder="Buscar cliente…"/>
          </div>
          <select id="filterStatus" class="btn btn-ghost btn-sm" style="border:1px solid var(--border)">
            <option value="">Todos os status</option>
            <option value="pendente">🕐 Pendente</option>
            <option value="confirmado">✅ Confirmado</option>
            <option value="concluido">✔️ Concluído</option>
            <option value="cancelado">❌ Cancelado</option>
            <option value="faltou">⚠️ Faltou</option>
          </select>
          <select id="filterProf" class="btn btn-ghost btn-sm" style="border:1px solid var(--border)">
            <option value="">Todos profissionais</option>
          </select>
          <input type="date" id="filterData" class="btn btn-ghost btn-sm" style="border:1px solid var(--border)"/>
          <button class="btn btn-ghost btn-sm" id="clearFilters"><i class="fas fa-times"></i></button>
        </div>
        <div class="table-container">
          <table>
            <thead><tr>
              <th>Cliente</th><th>Serviços / Profissional</th>
              <th>Data/Hora</th><th>Total</th><th>Status</th><th>Ações</th>
            </tr></thead>
            <tbody id="tbodyAgs">
              <tr><td colspan="6"><div class="loading"><i class="fas fa-circle-notch spin"></i></div></td></tr>
            </tbody>
          </table>
        </div>
        <div id="paginacao" class="pagination"></div>
      </div>

      <!-- TAB CALENDÁRIO -->
      <div class="tab-content" id="tab-calendario">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
          <button class="btn btn-ghost btn-sm" id="prevMonth"><i class="fas fa-chevron-left"></i></button>
          <h3 id="calTitle" style="font-size:1rem;font-weight:700;flex:1;text-align:center"></h3>
          <button class="btn btn-ghost btn-sm" id="nextMonth"><i class="fas fa-chevron-right"></i></button>
          <button class="btn btn-secondary btn-sm" id="todayBtn">Hoje</button>
        </div>
        <div class="heatmap-labels">
          <span>Dom</span><span>Seg</span><span>Ter</span>
          <span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span>
        </div>
        <div class="heatmap-grid" id="calGrid"></div>
        <div id="calDayDetail" style="margin-top:16px"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══ MODAL NOVO/EDITAR AGENDAMENTO ══ -->
<div class="modal-overlay" id="modal">
  <div class="modal modal-xl">
    <div class="modal-header">
      <h3 id="modalTitle"><i class="fas fa-calendar-plus"></i> Novo Agendamento</h3>
      <button class="modal-close" id="closeModal"><i class="fas fa-times"></i></button>
    </div>

    <!-- Para quem? -->
    <div class="form-group">
      <label style="font-weight:700;font-size:.84rem;margin-bottom:8px;display:block">
        <i class="fas fa-user" style="color:var(--primary-light)"></i> Para quem é o agendamento?
      </label>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-secondary btn-sm" id="btnParaMim" onclick="setParaQuem('eu')" style="flex:1;min-width:120px">
          <i class="fas fa-user-check"></i> Para mim (cliente)
        </button>
        <button class="btn btn-ghost btn-sm" id="btnParaCliente" onclick="setParaQuem('cliente')" style="flex:1;min-width:120px">
          <i class="fas fa-users"></i> Selecionar cliente
        </button>
        <button class="btn btn-ghost btn-sm" id="btnParaOutro" onclick="setParaQuem('outro')" style="flex:1;min-width:120px">
          <i class="fas fa-user-friends"></i> Outra pessoa
        </button>
      </div>
    </div>

    <!-- Cliente select (shown when 'cliente' mode) -->
    <div class="form-group" id="clienteWrap" style="display:none">
      <label>Cliente *</label>
      <select id="mCliente">
        <option value="">Selecione o cliente…</option>
      </select>
    </div>

    <!-- Para outro: nome livre -->
    <div class="form-group" id="outroWrap" style="display:none">
      <label>Nome da pessoa que será atendida *</label>
      <input type="text" id="mNomeOutro" placeholder="Nome completo"/>
    </div>

    <!-- Info: cliente logado (shown when 'eu' mode) -->
    <div id="euWrap" style="display:none;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);
         border-radius:10px;padding:12px 14px;margin-bottom:12px;font-size:.84rem">
      <i class="fas fa-user-circle" style="color:var(--primary-light)"></i>
      <span id="euLabel" style="margin-left:6px;font-weight:600"></span>
    </div>

    <!-- Forma de pagamento -->
    <div class="form-group">
      <label>Forma de Pagamento</label>
      <select id="mPagamento">
        <option value="dinheiro">Dinheiro</option>
        <option value="pix">PIX</option>
        <option value="cartao_debito">Cartão Débito</option>
        <option value="cartao_credito">Cartão Crédito</option>
        <option value="outros">Outros</option>
      </select>
    </div>

    <!-- Serviços -->
    <div class="form-group">
      <label><i class="fas fa-cut" style="color:var(--primary-light)"></i> Serviços
        <small style="color:var(--text3)">(com duração)</small></label>
      <div id="mServicosList"></div>
      <button class="btn btn-ghost btn-sm mt-8" id="mAddServico" type="button">
        <i class="fas fa-plus"></i> Adicionar serviço
      </button>
    </div>

    <!-- Produtos -->
    <div class="form-group">
      <label><i class="fas fa-shopping-bag" style="color:var(--secondary)"></i> Produtos
        <small style="color:var(--text3)">(sem duração — opcional)</small></label>
      <div id="mProdutosList"></div>
      <button class="btn btn-ghost btn-sm" id="mAddProduto" type="button">
        <i class="fas fa-plus"></i> Adicionar produto
      </button>
    </div>

    <!-- Calendário + Slots lado a lado -->
    <div class="form-group">
      <label><i class="fas fa-calendar-alt" style="color:var(--warning)"></i> Selecione a Data e Horário</label>
      <div class="cal-slots-layout">
        <!-- Calendário -->
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <button class="btn btn-ghost btn-sm" id="heatPrev"><i class="fas fa-chevron-left"></i></button>
            <span id="heatTitle" style="flex:1;text-align:center;font-size:.85rem;font-weight:700"></span>
            <button class="btn btn-ghost btn-sm" id="heatNext"><i class="fas fa-chevron-right"></i></button>
          </div>
          <div class="heatmap-labels">
            <span>Dom</span><span>Seg</span><span>Ter</span>
            <span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span>
          </div>
          <div class="heatmap-grid" id="heatGrid"></div>
          <div style="display:flex;gap:10px;margin-top:8px;font-size:.69rem;color:var(--text2);flex-wrap:wrap">
            <span><span style="display:inline-block;width:10px;height:10px;background:var(--bg3);border-radius:2px;margin-right:3px;vertical-align:middle"></span>Livre</span>
            <span><span style="display:inline-block;width:10px;height:10px;background:rgba(99,102,241,.6);border-radius:2px;margin-right:3px;vertical-align:middle"></span>Lotado</span>
            <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:3px;vertical-align:middle;background:repeating-linear-gradient(45deg,var(--bg3) 0,var(--bg3) 2px,transparent 2px,transparent 5px);border:1px solid var(--border)"></span>Fechado</span>
          </div>
        </div>

        <!-- Painel de Slots -->
        <div class="slots-panel" id="slotsPanel">
          <h4><i class="fas fa-clock" style="color:var(--secondary)"></i>
            Horários — <span id="slotDate">selecione uma data</span>
          </h4>
          <div id="slotsContainer">
            <p style="color:var(--text3);font-size:.8rem;text-align:center;margin-top:20px">
              <i class="fas fa-arrow-left"></i> Clique em um dia
            </p>
          </div>
          <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:10px">
            <label style="font-size:.74rem;color:var(--text2)">Ou informe manualmente:</label>
            <input type="time" id="mHoraManual"
              style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;
                     padding:7px 10px;color:var(--text);font-size:.85rem;margin-top:4px"/>
          </div>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>Observações</label>
      <textarea id="mObs" placeholder="Anotações sobre o agendamento…" rows="2"></textarea>
    </div>

    <!-- Resumo -->
    <div id="mResumo" style="display:none;background:var(--bg3);border:1px solid var(--border);
         border-radius:10px;padding:14px;margin-bottom:12px">
      <div style="font-size:.84rem;font-weight:700;margin-bottom:8px">📋 Resumo do Agendamento</div>
      <div id="mResumoContent" style="font-size:.82rem;color:var(--text2);display:flex;flex-direction:column;gap:4px"></div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" id="cancelModal">Cancelar</button>
      <button class="btn btn-primary" id="salvar"><i class="fas fa-save"></i> Salvar Agendamento</button>
    </div>
  </div>
</div>

<!-- ══ MODAL DETALHES ══ -->
<div class="modal-overlay" id="modalDetalhes">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3><i class="fas fa-calendar-check"></i> Detalhes do Agendamento</h3>
      <button class="modal-close" id="closeModalDetalhes"><i class="fas fa-times"></i></button>
    </div>
    <div id="detalhesContent"></div>
    <div class="modal-footer" id="detalhesFtr"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
import { requireAuth, renderUserInSidebar, showToast, isAdmin } from './supabase/session-manager.js';
import {
  getAllAgendamentos, getAgendamento, createAgendamento, updateAgendamento,
  getHeatmapDoMes, getSlotsDisponiveis,
  getAllClientes, getAllEquipe, getAllServicos, getHorarios,
  ensureUserAndClient, createCliente,
  formatCurrency, formatDateTime, formatDate, formatTime,
  STATUS_LABELS, PAGAMENTO_LABELS
} from './supabase/database.js';
import { getSidebarHTML, initSidebarToggle, showAdminItems, showStaffItems, updatePendingBadge } from './js/sidebar.js';

document.getElementById('sidebarMount').innerHTML = getSidebarHTML('agendamentos');
initSidebarToggle();
const auth = await requireAuth();
if (!auth) throw new Error('Not authenticated');
const { user, profile } = auth;
const adminMode = isAdmin(user, profile);
const atendenteMode = profile?.role === 'atendente';
renderUserInSidebar(profile);
if (adminMode) showAdminItems();
else if (atendenteMode) showStaffItems();
setTimeout(() => document.getElementById('pageLoader')?.classList.add('hide'), 400);
document.getElementById('logoutBtn')?.addEventListener('click', () =>
  import('./supabase/database.js').then(m => m.signOut()).then(() => window.location.href = 'index.html'));

// ── Tabs ──────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn[data-tab]').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`tab-${btn.dataset.tab}`)?.classList.add('active');
    if (btn.dataset.tab === 'calendario') renderCalendar();
  });
});

// ── Auto-refresh 30s ──────────────────────────────────────────
let countdown = 30;
const countdownEl = document.getElementById('refreshCountdown');
function tickCountdown() {
  countdown--;
  if (countdownEl) countdownEl.textContent = countdown + 's';
  if (countdown <= 0) { countdown = 30; loadAll(); }
}
let countdownTimer = setInterval(tickCountdown, 1000);
document.getElementById('btnRefresh')?.addEventListener('click', () => {
  clearInterval(countdownTimer); countdown = 30;
  if (countdownEl) countdownEl.textContent = '30s';
  loadAll(); countdownTimer = setInterval(tickCountdown, 1000);
});
document.addEventListener('visibilitychange', () => {
  if (document.hidden) clearInterval(countdownTimer);
  else { countdown = 30; loadAll(); countdownTimer = setInterval(tickCountdown, 1000); }
});

// ── State ─────────────────────────────────────────────────────
let allAgs = [], filteredAgs = [], equipe = [], clientes = [], servicos = [], horarios = [];
let currentPage = 1; const perPage = 20;
let calYear = new Date().getFullYear(), calMonth = new Date().getMonth() + 1;
let heatYear = new Date().getFullYear(), heatMonth = new Date().getMonth() + 1;
let selectedDate = null, selectedTime = null;
// "paraQuem" modes: 'eu' = current user's client, 'cliente' = select from list, 'outro' = free text
let paraQuemMode = 'eu';
let myClienteId  = null; // client record matching current user email

// ── Load all ──────────────────────────────────────────────────
async function loadAll() {
  try {
    [equipe, clientes, servicos, horarios] = await Promise.all([
      getAllEquipe(), getAllClientes(), getAllServicos(), getHorarios()
    ]);

    // Try to find current user's client record by user_id first, then by email
    myClienteId = clientes.find(c => c.user_id === user.id)?.id
               || clientes.find(c => c.email === user.email || c.email === profile?.email)?.id
               || null;

    // If still not found, auto-create via ensureUserAndClient
    if (!myClienteId) {
      try {
        const result = await ensureUserAndClient(user);
        if (result?.cliente_id) {
          myClienteId = result.cliente_id;
          // Refresh clientes list to include the new record
          clientes = await getAllClientes();
        }
      } catch (e) { console.warn('ensureUserAndClient:', e.message); }
    }

    const selProf = document.getElementById('filterProf');
    const curVal  = selProf.value;
    selProf.innerHTML = '<option value="">Todos profissionais</option>' +
      equipe.map(e => `<option value="${e.id}">${e.nome}</option>`).join('');
    if (curVal) selProf.value = curVal;

    allAgs = await getAllAgendamentos({});
    // Non-admins only see their own appointments
    if (!adminMode) allAgs = allAgs.filter(a => a.criado_por === user.id);

    // Update pending badge in sidebar
    const pendentes = allAgs.filter(a => a.status === 'pendente').length;
    updatePendingBadge(pendentes);

    applyFilters();
  } catch (err) {
    console.error('loadAll agendamentos:', err);
    showToast('Erro ao carregar agendamentos.', 'error');
  }
}

// ── Filters ───────────────────────────────────────────────────
function applyFilters() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('filterStatus').value;
  const profId = document.getElementById('filterProf').value;
  const data   = document.getElementById('filterData').value;
  filteredAgs = allAgs.filter(a => {
    if (search && !a.clientes?.nome?.toLowerCase().includes(search)) return false;
    if (status && a.status !== status) return false;
    if (profId && !a.agendamento_servicos?.some(s => s.equipe?.id === profId)) return false;
    if (data   && !a.data_hora?.startsWith(data)) return false;
    return true;
  });
  currentPage = 1;
  render();
}

function render() {
  const start = (currentPage - 1) * perPage;
  const page  = filteredAgs.slice(start, start + perPage);
  const tbody = document.getElementById('tbodyAgs');
  if (!filteredAgs.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">
      <i class="fas fa-calendar-times"></i><h3>Nenhum agendamento encontrado</h3>
      <p>Clique em "Novo" para criar um agendamento.</p></div></td></tr>`;
  } else {
    tbody.innerHTML = page.map(ag => {
      const st       = STATUS_LABELS[ag.status] || {};
      const servNomes = ag.agendamento_servicos?.map(s => s.servicos?.nome || '').filter(Boolean).join(', ') || '—';
      const profNome  = ag.agendamento_servicos?.map(s => s.equipe?.nome || '').filter(Boolean).join(', ') || '—';
      const cor       = ag.agendamento_servicos?.[0]?.equipe?.cor_agenda || '#6366f1';
      return `<tr>
        <td>
          <strong>${ag.clientes?.nome || '—'}</strong>
          ${ag.para_outro ? `<br><small style="color:var(--warning)"><i class="fas fa-user-friends"></i> Para: ${ag.nome_outro || 'outro'}</small>` : ''}
          <br><small style="color:var(--text3)">${ag.clientes?.telefone || ''}</small>
        </td>
        <td>
          <div style="font-size:.84rem">${servNomes}</div>
          <div style="font-size:.76rem;color:var(--text2);display:flex;align-items:center;gap:5px">
            <span style="width:7px;height:7px;border-radius:50%;background:${cor};flex-shrink:0"></span>${profNome}
          </div>
        </td>
        <td>${formatDateTime(ag.data_hora)}</td>
        <td><strong>${formatCurrency(ag.valor_total || 0)}</strong></td>
        <td><span class="badge" style="background:${st.color}22;color:${st.color}">${st.icon || ''} ${st.label || ag.status}</span></td>
        <td class="td-actions">
          <button class="btn btn-ghost btn-sm btn-icon" onclick="verDetalhes('${ag.id}')" title="Ver detalhes">
            <i class="fas fa-eye"></i>
          </button>
        </td>
      </tr>`;
    }).join('');
  }
  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(filteredAgs.length / perPage);
  if (total <= 1) { document.getElementById('paginacao').innerHTML = ''; return; }
  let html = `<button class="page-btn" ${currentPage===1?'disabled':''} onclick="goPage(${currentPage-1})"><i class="fas fa-chevron-left"></i></button>`;
  for (let p = 1; p <= total; p++) {
    if (p===1||p===total||Math.abs(p-currentPage)<=1)
      html += `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
    else if (Math.abs(p-currentPage)===2)
      html += `<span style="padding:0 4px;color:var(--text3)">…</span>`;
  }
  html += `<button class="page-btn" ${currentPage===total?'disabled':''} onclick="goPage(${currentPage+1})"><i class="fas fa-chevron-right"></i></button>`;
  document.getElementById('paginacao').innerHTML = html;
}
window.goPage = p => { currentPage = p; render(); };

// ── Calendário ────────────────────────────────────────────────
async function renderCalendar() {
  document.getElementById('calTitle').textContent =
    new Date(calYear, calMonth-1, 1).toLocaleDateString('pt-BR', {month:'long',year:'numeric'});
  const heatmap  = await getHeatmapDoMes(calYear, calMonth);
  const firstDay = new Date(calYear, calMonth-1, 1).getDay();
  const daysInM  = new Date(calYear, calMonth, 0).getDate();
  const today    = new Date();
  let html = '';
  for (let i = 0; i < firstDay; i++) html += '<div class="heatmap-day empty"></div>';
  for (let d = 1; d <= daysInM; d++) {
    const count   = heatmap[d] || 0;
    const heat    = count===0?0:count<=2?1:count<=4?2:count<=7?3:4;
    const date    = new Date(calYear, calMonth-1, d);
    const isToday = date.toDateString()===today.toDateString();
    const isPast  = date<new Date(today.toDateString());
    const dow     = date.getDay();
    const horar   = horarios.find(x => x.dia_semana===dow);
    const closed  = horar && !horar.aberto;
    let cls = `heatmap-day heat-${heat}`;
    if (isToday) cls += ' today'; if (isPast) cls += ' past'; if (closed) cls += ' closed';
    html += `<div class="${cls}" onclick="showCalDay(${calYear},${calMonth},${d})" title="${count} agendamento(s)">${d}</div>`;
  }
  document.getElementById('calGrid').innerHTML = html;
  document.getElementById('calDayDetail').innerHTML = '';
}

window.showCalDay = async (y, m, d) => {
  const ags = allAgs.filter(a => {
    const dt = new Date(a.data_hora);
    return dt.getFullYear()===y && dt.getMonth()+1===m && dt.getDate()===d;
  });
  const dateStr = new Date(y,m-1,d).toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
  const el = document.getElementById('calDayDetail');

  // ── Build rich hourly timeline with profissional + cliente + serviço + status ──
  let timelineHtml = '';
  const hours = {};
  ags.forEach(ag => {
    const h = new Date(ag.data_hora).getHours();
    if (!hours[h]) hours[h] = [];
    hours[h].push(ag);
  });

  // Determine operating hours for this day
  const dow = new Date(y,m-1,d).getDay();
  const horar = horarios.find(x => x.dia_semana === dow);
  const dayOpen = horar?.aberto !== false;
  const hourStart = horar ? parseInt(horar.hora_abertura?.split(':')[0] || '7') : 7;
  const hourEnd   = horar ? parseInt(horar.hora_fechamento?.split(':')[0] || '20') : 20;

  for (let h = Math.min(hourStart, 7); h <= Math.max(hourEnd, 20); h++) {
    const hAgs = hours[h] || [];
    const inHours = h >= hourStart && h < hourEnd;
    const bgStyle = !dayOpen ? 'background:rgba(107,114,128,.04)' : (!inHours ? 'background:rgba(239,68,68,.04)' : '');
    timelineHtml += `<div style="display:flex;gap:10px;min-height:40px;padding:4px 0;
        border-bottom:1px solid var(--border);align-items:flex-start;${bgStyle}">
      <span style="width:46px;font-size:.72rem;color:${inHours&&dayOpen?'var(--text3)':'var(--danger)'};
          padding-top:5px;flex-shrink:0;font-weight:600">${String(h).padStart(2,'0')}:00</span>
      <div style="flex:1;min-width:0">
        ${hAgs.length === 0
          ? (inHours && dayOpen
              ? `<span style="font-size:.7rem;color:var(--text3);opacity:.5">— livre —</span>`
              : '')
          : hAgs.map(ag => {
              const st        = STATUS_LABELS[ag.status] || {};
              const cor       = ag.agendamento_servicos?.[0]?.equipe?.cor_agenda || st.color || '#6366f1';
              const clienteNome = ag.para_outro
                ? (ag.nome_outro || 'Outra pessoa')
                : (ag.clientes?.nome || '—');
              const clienteTel  = ag.clientes?.telefone || '';
              const servicos    = ag.agendamento_servicos?.map(s => {
                const sNome = s.servicos?.nome || '';
                const pNome = s.equipe?.nome || '';
                const pCor  = s.equipe?.cor_agenda || '#6366f1';
                const sIco  = s.servicos?.icone || '✂️';
                return `<span style="display:inline-flex;align-items:center;gap:3px;margin-right:6px;font-size:.72rem">
                  ${sIco} ${sNome}
                  ${pNome ? `<span style="color:${pCor};font-weight:700">→ ${pNome}</span>` : ''}
                </span>`;
              }).join('') || '—';
              const hora = new Date(ag.data_hora).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
              return `<div onclick="verDetalhes('${ag.id}')"
                  style="background:${cor}18;border-left:3px solid ${cor};border-radius:6px;
                         padding:6px 10px;margin-bottom:4px;cursor:pointer">
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:3px">
                  <span style="font-size:.75rem;color:${cor};font-weight:700">${hora}</span>
                  <strong style="font-size:.82rem">${clienteNome}</strong>
                  ${clienteTel ? `<span style="font-size:.7rem;color:var(--text2)"><i class="fas fa-phone" style="font-size:.6rem"></i> ${clienteTel}</span>` : ''}
                  <span class="badge" style="background:${st.color}22;color:${st.color};font-size:.65rem;margin-left:auto">${st.icon||''} ${st.label||ag.status}</span>
                </div>
                <div style="font-size:.75rem;color:var(--text2)">${servicos}</div>
                ${ag.para_outro ? `<div style="font-size:.68rem;color:var(--warning);margin-top:2px"><i class="fas fa-user-friends"></i> Para: ${ag.nome_outro||'outra pessoa'}</div>` : ''}
              </div>`;
            }).join('')
        }
      </div>
    </div>`;
  }

  // Slot summary at bottom
  const slotSummary = ags.length > 0
    ? `<div style="padding:8px 0 4px;font-size:.75rem;color:var(--text2);border-top:1px solid var(--border);margin-top:4px">
        ${ags.filter(a=>a.status==='pendente').length} pendente(s) ·
        ${ags.filter(a=>a.status==='confirmado').length} confirmado(s) ·
        ${ags.filter(a=>a.status==='concluido').length} concluído(s) ·
        ${ags.filter(a=>a.status==='cancelado').length} cancelado(s)
       </div>`
    : '';

  el.innerHTML = `<div class="card">
    <div class="card-header" style="gap:10px;flex-wrap:wrap">
      <span class="card-title">📅 ${dateStr}</span>
      <span style="font-size:.78rem;color:var(--text2)">${ags.length} agendamento(s)</span>
      ${!dayOpen ? `<span class="badge badge-gray" style="font-size:.7rem">Fechado</span>` : ''}
      <button class="btn btn-primary btn-sm" style="margin-left:auto"
        onclick="document.getElementById('btnNovo').click()">
        <i class="fas fa-plus"></i> Novo
      </button>
    </div>
    <div style="max-height:480px;overflow-y:auto">
      ${timelineHtml || '<p style="color:var(--text3);font-size:.84rem;padding:12px 0;text-align:center"><i class="fas fa-calendar-check"></i><br>Nenhum agendamento neste dia.</p>'}
      ${slotSummary}
    </div>
  </div>`;
};

// ── Heatmap picker ────────────────────────────────────────────
async function renderHeatmap() {
  document.getElementById('heatTitle').textContent =
    new Date(heatYear, heatMonth-1, 1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  const heatmap  = await getHeatmapDoMes(heatYear, heatMonth);
  const firstDay = new Date(heatYear, heatMonth-1, 1).getDay();
  const days     = new Date(heatYear, heatMonth, 0).getDate();
  const today    = new Date();
  let html = '';
  for (let i = 0; i < firstDay; i++) html += '<div class="heatmap-day empty"></div>';
  for (let d = 1; d <= days; d++) {
    const count   = heatmap[d]||0;
    const heat    = count===0?0:count<=2?1:count<=4?2:count<=7?3:4;
    const date    = new Date(heatYear, heatMonth-1, d);
    const isToday = date.toDateString()===today.toDateString();
    const isPast  = date<new Date(today.toDateString());
    const dow     = date.getDay();
    const horar   = horarios.find(x=>x.dia_semana===dow);
    const closed  = horar&&!horar.aberto;
    const dateKey = `${heatYear}-${String(heatMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isSel   = selectedDate===dateKey;
    let cls = `heatmap-day heat-${heat}`;
    if (isToday) cls+=' today';
    if (isPast&&!isToday) cls+=' past';
    if (closed) cls+=' closed';
    if (isSel)  cls+=' selected';
    // Admin can click closed days to manually schedule (manual time entry)
    const clickable = !isPast && (!closed || adminMode);
    html += `<div class="${cls}" ${clickable?`onclick="selectDate(${heatYear},${heatMonth},${d},${closed})"`:''} title="${count} agendamento(s)${closed?' (Fechado)':''}">${d}</div>`;
  }
  document.getElementById('heatGrid').innerHTML = html;
}

window.selectDate = async (y, m, d, isClosed = false) => {
  selectedDate = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  selectedTime = null;
  document.getElementById('mHoraManual').value = '';
  await renderHeatmap();

  // Get first profissional & total duration
  const validSvc = svcRows.filter(Boolean).filter(s=>s.servico_id);
  const profId   = validSvc[0]?.profissional_id || null;
  const durMin   = validSvc.reduce((a,s)=>a+(s.duracao_min||60),0)||60;

  document.getElementById('slotDate').textContent =
    new Date(y,m-1,d).toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});

  const container = document.getElementById('slotsContainer');
  container.innerHTML = '<div style="text-align:center;padding:20px"><i class="fas fa-circle-notch spin" style="color:var(--primary)"></i></div>';

  // For closed days (admin only): skip slot loading, show manual-time-only notice
  if (isClosed) {
    container.innerHTML = `<div style="padding:10px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);
        border-radius:8px;font-size:.8rem;color:var(--warning);text-align:center;margin-bottom:8px">
      <i class="fas fa-store-slash"></i> Dia fechado — horários automáticos indisponíveis.<br>
      <small style="color:var(--text2)">Use o campo manual abaixo para inserir o horário.</small>
    </div>`;
    updateResumo();
    return;
  }

  // getSlotsDisponiveis retorna TODOS os slots (livres e ocupados)
  const slots = await getSlotsDisponiveis(selectedDate, profId, durMin);

  if (!slots.length) {
    container.innerHTML = `<div style="padding:10px;background:rgba(239,68,68,.08);border-radius:8px;font-size:.8rem;color:var(--danger);text-align:center">
      <i class="fas fa-store-slash"></i><br>Estabelecimento fechado neste dia.<br>
      <small style="color:var(--text2);margin-top:4px;display:block">Use o campo manual abaixo para forçar um horário.</small>
    </div>`;
    updateResumo();
    return;
  }

  // Build profissional name map for occupied slots
  const profMap = {};
  equipe.forEach(e => { profMap[e.id] = e.nome; });

  container.innerHTML = slots.map(s => {
    if (s.livre) {
      return `<div class="slot-item livre${selectedTime===s.hora?' selected':''}" onclick="selectSlot('${s.hora}','${s.iso}')">
        <span class="slot-dot" style="background:#10b981"></span>
        <span class="slot-hora">${s.hora}</span>
        <span class="slot-info">Disponível · ${durMin}min</span>
        <i class="fas fa-check" style="color:#10b981;font-size:.7rem"></i>
      </div>`;
    } else {
      // Show client + professional info for occupied slots (admin sees detail, others just "Ocupado")
      const ocupInfo = (adminMode || atendenteMode)
        ? s.ocupacoes?.map(o => {
            const pNome = o.profissional_nome || profMap[o.profissional_id] || 'Prof.';
            const cNome = o.cliente_nome || '—';
            const sNome = o.servico_nome || '';
            return `${pNome}${cNome !== '—' ? ' · ' + cNome : ''}${sNome ? ' · ' + sNome : ''}`;
          }).join('; ') || 'Ocupado'
        : 'Horário indisponível';
      const tooltip = `Ocupado — ${ocupInfo}`;
      return `<div class="slot-item ocupado" title="${tooltip}">
        <span class="slot-dot" style="background:#ef4444"></span>
        <span class="slot-hora">${s.hora}</span>
        <span class="slot-info" style="color:#ef4444;font-size:.72rem" title="${tooltip}">
          ${(adminMode || atendenteMode) ? ocupInfo.slice(0,40)+(ocupInfo.length>40?'…':'') : 'Indisponível'}
        </span>
        <i class="fas fa-times" style="color:#ef4444;font-size:.7rem"></i>
      </div>`;
    }
  }).join('');

  // Summary line
  const livresCount = slots.filter(s=>s.livre).length;
  if (livresCount === 0) {
    container.innerHTML += `<div style="margin-top:8px;padding:8px;background:rgba(239,68,68,.08);border-radius:8px;font-size:.78rem;color:#ef4444;text-align:center">
      <i class="fas fa-calendar-times"></i> Nenhum slot livre neste dia${profId?' para este profissional':''}.
      ${profId ? '<br><small>Tente outro profissional ou use o horário manual.</small>' : ''}
    </div>`;
  }

  updateResumo();
};

  updateResumo();
};
window.onQtdeChange = (idx, inp) => { prodRows[idx].quantidade=parseInt(inp.value)||1; updateResumo(); };
window.removeProdRow = (idx) => { document.getElementById(`prodRow-${idx}`)?.remove(); prodRows[idx]=null; updateResumo(); };
document.getElementById('mAddProduto')?.addEventListener('click', addProdRow);

// ── Resumo ────────────────────────────────────────────────────
function updateResumo() {
  const validSvc  = svcRows.filter(Boolean).filter(s=>s.servico_id);
  const validProd = prodRows.filter(Boolean).filter(p=>p.servico_id);
  if (!validSvc.length&&!validProd.length) { document.getElementById('mResumo').style.display='none'; return; }

  const totalSvc  = validSvc.reduce((a,s)=>a+s.preco,0);
  const totalProd = validProd.reduce((a,p)=>a+(p.preco_unitario*p.quantidade),0);
  const total     = totalSvc+totalProd;

  let lines = validSvc.map(s => {
    const svcNome  = servicos.find(x=>x.id===s.servico_id)?.nome||'Serviço';
    const profNome = equipe.find(x=>x.id===s.profissional_id)?.nome||'Qualquer profissional';
    return `<div style="display:flex;justify-content:space-between">
      <span>✂️ ${svcNome} <span style="color:var(--text3)">(${profNome} · ${s.duracao_min}min)</span></span>
      <span>${formatCurrency(s.preco)}</span></div>`;
  }).join('');

  lines += validProd.map(p => {
    const prodNome = servicos.find(x=>x.id===p.servico_id)?.nome||'Produto';
    return `<div style="display:flex;justify-content:space-between">
      <span>🛍️ ${prodNome} ×${p.quantidade}</span>
      <span>${formatCurrency(p.preco_unitario*p.quantidade)}</span></div>`;
  }).join('');

  lines += `<div style="display:flex;justify-content:space-between;border-top:1px solid var(--border);
    margin-top:8px;padding-top:8px;font-weight:700">
    <span>Total</span><span style="color:var(--secondary)">${formatCurrency(total)}</span></div>`;

  const hora = selectedTime || document.getElementById('mHoraManual').value;
  if (selectedDate && hora) {
    lines += `<div style="margin-top:6px;color:var(--primary-light);font-size:.8rem">
      <i class="fas fa-clock"></i> ${selectedDate} às ${hora}</div>`;
  }

  document.getElementById('mResumoContent').innerHTML = lines;
  document.getElementById('mResumo').style.display = '';
}

// ── Close / Open modal ────────────────────────────────────────
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('btnNovo')?.addEventListener('click', () => openModal());
document.getElementById('closeModal')?.addEventListener('click', closeModal);
document.getElementById('cancelModal')?.addEventListener('click', closeModal);

// ── Salvar Agendamento ────────────────────────────────────────
document.getElementById('salvar')?.addEventListener('click', async () => {
  // Resolve client ID based on mode
  let clienteId   = null;
  let paraOutro   = false;
  let nomeOutro   = null;

  if (paraQuemMode === 'eu') {
    // Auto-resolve: try to find or create the client record for this user
    if (!myClienteId) {
      try {
        const btn2 = document.getElementById('salvar');
        btn2.disabled = true; btn2.innerHTML = '<i class="fas fa-circle-notch spin"></i> Verificando cadastro…';
        const result = await ensureUserAndClient(user);
        if (result?.cliente_id) {
          myClienteId = result.cliente_id;
          clientes = await getAllClientes();
        }
        btn2.disabled = false; btn2.innerHTML = '<i class="fas fa-save"></i> Salvar Agendamento';
      } catch (e) { console.warn('ensureUserAndClient in salvar:', e.message); }
    }
    if (!myClienteId) {
      // Last resort: create a client record directly
      try {
        const newC = await createCliente({
          user_id: user.id, nome: profile?.nome || user.email.split('@')[0],
          email: user.email, ativo: true
        });
        myClienteId = newC?.id || null;
        if (myClienteId) clientes = await getAllClientes();
      } catch (e) { console.warn('createCliente fallback:', e.message); }
    }
    if (!myClienteId) {
      showToast('Não foi possível vincular seu cadastro. Contate o administrador.', 'error'); return;
    }
    clienteId = myClienteId;
  } else if (paraQuemMode === 'cliente') {
    clienteId = document.getElementById('mCliente').value;
    if (!clienteId) { showToast('Selecione um cliente.', 'warning'); return; }
  } else if (paraQuemMode === 'outro') {
    // For "outro": use current user's client; or create a guest client entry
    nomeOutro = document.getElementById('mNomeOutro').value.trim();
    if (!nomeOutro) { showToast('Informe o nome da pessoa que será atendida.', 'warning'); return; }
    clienteId = myClienteId || clientes[0]?.id || null;
    if (!clienteId) {
      try {
        const newC = await createCliente({ nome: nomeOutro, ativo: true });
        clienteId = newC?.id || null;
      } catch { /* ignore */ }
    }
    if (!clienteId) { showToast('Não foi possível vincular o atendimento.', 'warning'); return; }
    paraOutro = true;
  }

  const horaManual = document.getElementById('mHoraManual').value;
  const hora = selectedTime || horaManual;
  if (!selectedDate || !hora) { showToast('Selecione uma data e horário no calendário.', 'warning'); return; }

  const svcItems = svcRows.filter(Boolean).filter(s=>s.servico_id);
  if (!svcItems.length) { showToast('Adicione pelo menos um serviço.', 'warning'); return; }

  const btn = document.getElementById('salvar');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-circle-notch spin"></i> Salvando…';
  try {
    const baseTime = new Date(`${selectedDate}T${hora}:00`);
    let offset = 0;
    const servicosPayload = svcItems.map(s => {
      const inicio = new Date(baseTime.getTime()+offset*60000);
      const fim    = new Date(inicio.getTime()+(s.duracao_min||60)*60000);
      offset += s.duracao_min||60;
      return { ...s, hora_inicio:inicio.toISOString(), hora_fim:fim.toISOString() };
    });
    const prodItems    = prodRows.filter(Boolean).filter(p=>p.servico_id);
    const duracaoTotal = svcItems.reduce((a,s)=>a+(s.duracao_min||60),0);

    await createAgendamento({
      cliente_id:      clienteId,
      criado_por:      user.id,
      data_hora:       baseTime.toISOString(),
      duracao_min:     duracaoTotal,
      forma_pagamento: document.getElementById('mPagamento').value,
      observacoes:     document.getElementById('mObs').value||null,
      status:          'pendente',
      para_outro:      paraOutro,
      nome_outro:      nomeOutro,
      servicos:        servicosPayload,
      produtos:        prodItems
    });

    showToast('Agendamento criado com sucesso!', 'success');
    closeModal();
    await loadAll();
  } catch (err) {
    showToast(err.message||'Erro ao criar agendamento.', 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-save"></i> Salvar Agendamento';
  }
});

// ── Ver Detalhes ──────────────────────────────────────────────
window.verDetalhes = async (id) => {
  document.getElementById('modalDetalhes').classList.add('open');
  document.getElementById('detalhesContent').innerHTML =
    '<div class="loading"><i class="fas fa-circle-notch spin"></i> Carregando…</div>';
  try {
    const ag  = await getAgendamento(id);
    const st  = STATUS_LABELS[ag.status]||{};
    const servNomes = ag.agendamento_servicos?.map(s =>
      `<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
        <span>${s.servicos?.icone||'✂️'}</span>
        <span>${s.servicos?.nome||'—'}</span>
        ${s.equipe?`<span style="color:var(--text3)">→ ${s.equipe.nome}</span>`:''}
        <span style="color:var(--text3)">(${s.duracao_min}min)</span>
        <strong>${formatCurrency(s.preco)}</strong>
      </div>`).join('')||'—';

    const prodNomes = ag.agendamento_produtos?.length
      ? ag.agendamento_produtos.map(p =>
        `<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
          <span>${p.servicos?.icone||'🛍️'}</span>
          <span>${p.servicos?.nome||'—'} ×${p.quantidade}</span>
          <strong>${formatCurrency((p.preco_unitario||0)*p.quantidade)}</strong>
        </div>`).join('')
      : null;

    document.getElementById('detalhesContent').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;font-size:.87rem">
        <div>
          <label style="font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Cliente</label>
          <div style="font-weight:700;margin-top:2px">${ag.clientes?.nome||'—'}</div>
          <div style="color:var(--text2)">${ag.clientes?.telefone||''}</div>
          ${ag.para_outro?`<div style="color:var(--warning);margin-top:4px;font-size:.8rem">
            <i class="fas fa-user-friends"></i> Para: ${ag.nome_outro||'outra pessoa'}</div>`:''}
        </div>
        <div>
          <label style="font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Data / Hora</label>
          <div style="font-weight:700;margin-top:2px">${formatDateTime(ag.data_hora)}</div>
          <div style="color:var(--text2)">${ag.duracao_min} min no total</div>
        </div>
        <div style="grid-column:span 2">
          <label style="font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Serviços</label>
          <div style="margin-top:4px">${servNomes}</div>
        </div>
        ${prodNomes?`<div style="grid-column:span 2">
          <label style="font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Produtos</label>
          <div style="margin-top:4px">${prodNomes}</div>
        </div>`:''}
        <div>
          <label style="font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Pagamento</label>
          <div style="margin-top:2px">${PAGAMENTO_LABELS[ag.forma_pagamento]||ag.forma_pagamento}</div>
        </div>
        <div>
          <label style="font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Status</label>
          <div style="margin-top:4px">
            <span class="badge" style="background:${st.color}22;color:${st.color}">${st.icon||''} ${st.label||ag.status}</span>
          </div>
        </div>
        <div style="grid-column:span 2;border-top:1px solid var(--border);padding-top:12px">
          <label style="font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Total</label>
          <div style="font-size:1.35rem;font-weight:800;color:var(--secondary);margin-top:2px">${formatCurrency(ag.valor_total||0)}</div>
        </div>
        ${ag.observacoes?`<div style="grid-column:span 2">
          <label style="font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Observações</label>
          <div style="color:var(--text2);margin-top:2px">${ag.observacoes}</div>
        </div>`:''}
      </div>`;

    const ftr = document.getElementById('detalhesFtr');
    ftr.innerHTML = '';
    const btnClose2 = document.createElement('button');
    btnClose2.className = 'btn btn-secondary';
    btnClose2.textContent = 'Fechar';
    btnClose2.addEventListener('click', ()=>document.getElementById('modalDetalhes').classList.remove('open'));
    ftr.appendChild(btnClose2);

    if (adminMode) {
      const sel = document.createElement('select');
      sel.className = 'btn btn-ghost btn-sm';
      sel.style.border = '1px solid var(--border)';
      sel.innerHTML = `<option value="">Alterar status…</option>
        <option value="pendente">🕐 Pendente</option>
        <option value="confirmado">✅ Confirmado</option>
        <option value="concluido">✔️ Concluído</option>
        <option value="cancelado">❌ Cancelado</option>
        <option value="faltou">⚠️ Faltou</option>`;
      sel.value = ag.status;

      const btnSave = document.createElement('button');
      btnSave.className = 'btn btn-primary';
      btnSave.innerHTML = '<i class="fas fa-save"></i> Salvar Status';
      btnSave.addEventListener('click', async () => {
        const ns = sel.value;
        if (!ns) { showToast('Selecione um status.','warning'); return; }
        btnSave.disabled = true;
        try {
          await updateAgendamento(id,{status:ns});
          showToast('Status atualizado!','success');
          document.getElementById('modalDetalhes').classList.remove('open');
          await loadAll();
        } catch(err){ showToast(err.message,'error'); }
        finally { btnSave.disabled = false; }
      });
      ftr.appendChild(sel);
      ftr.appendChild(btnSave);
    }
  } catch(err) {
    document.getElementById('detalhesContent').innerHTML =
      `<p style="color:var(--danger)"><i class="fas fa-exclamation-circle"></i> Erro: ${err.message}</p>`;
  }
};

document.getElementById('closeModalDetalhes')?.addEventListener('click', () =>
  document.getElementById('modalDetalhes').classList.remove('open'));

// ── URL params ────────────────────────────────────────────────
const urlParams  = new URLSearchParams(location.search);
const urlId      = urlParams.get('id');
const urlCliente = urlParams.get('cliente');
const urlNovo    = urlParams.get('novo');

await loadAll();
if (urlId)                setTimeout(()=>verDetalhes(urlId), 300);
if (urlCliente || urlNovo) setTimeout(()=>openModal(), 300);
</script>
