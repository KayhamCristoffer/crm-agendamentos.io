<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agendamentos — CRM</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    /* Heatmap */
    .heatmap-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin:8px 0;}
    .heatmap-labels{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;}
    .heatmap-labels span{text-align:center;font-size:.66rem;color:var(--text3);font-weight:600;text-transform:uppercase;}
    .heatmap-day{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;
      font-size:.72rem;font-weight:600;cursor:pointer;transition:.15s;border:2px solid transparent;}
    .heatmap-day:hover{border-color:var(--primary);}
    .heatmap-day.empty{background:transparent;cursor:default;border:none;}
    .heatmap-day.heat-0{background:var(--bg3);color:var(--text3);}
    .heatmap-day.heat-1{background:rgba(99,102,241,.18);color:#a5b4fc;}
    .heatmap-day.heat-2{background:rgba(99,102,241,.38);color:#c7d2fe;}
    .heatmap-day.heat-3{background:rgba(99,102,241,.62);color:#e0e7ff;}
    .heatmap-day.heat-4{background:rgba(99,102,241,.88);color:#fff;}
    .heatmap-day.today{box-shadow:0 0 0 2px var(--secondary);}
    .heatmap-day.past{opacity:.45;}
    .heatmap-day.closed{background:repeating-linear-gradient(45deg,var(--bg3) 0,var(--bg3) 2px,transparent 2px,transparent 6px);
      color:var(--text3);cursor:default;}
    .heatmap-day.selected{border-color:var(--secondary);box-shadow:0 0 0 2px var(--secondary);}
    /* Slots */
    .slots-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;}
    .slot-btn{padding:6px 13px;border-radius:8px;border:1px solid var(--border);
      background:var(--bg3);color:var(--text);font-size:.79rem;font-weight:600;cursor:pointer;transition:.15s;}
    .slot-btn:hover{border-color:var(--primary);background:rgba(99,102,241,.12);}
    .slot-btn.selected{background:var(--primary);color:#fff;border-color:var(--primary);}
    .slot-btn.busy{opacity:.35;cursor:not-allowed;text-decoration:line-through;}
    /* Service / Product rows in modal */
    .svc-row{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:13px;margin-bottom:9px;}
    .prod-row{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px;margin-bottom:8px;
      display:grid;grid-template-columns:1fr 90px auto;gap:8px;align-items:end;}
  </style>
</head>
<body>
<div class="page-loader" id="pageLoader"><div class="loader-ring"></div></div>
<div id="sidebarMount"></div>
<div class="app-layout">
  <div class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        <div class="topbar-title"><h1>Agendamentos</h1><p>Gerencie os atendimentos</p></div>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-ghost btn-sm" id="btnRefresh" title="Atualizar">
          <i class="fas fa-sync-alt"></i> <span id="refreshCountdown">30s</span>
        </button>
        <button class="btn btn-primary btn-sm" id="btnNovo">
          <i class="fas fa-plus"></i> Novo
        </button>
      </div>
    </div>

    <div class="page-content">
      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="lista">📋 Lista</button>
        <button class="tab-btn" data-tab="calendario">📅 Calendário</button>
      </div>

      <!-- TAB LISTA -->
      <div class="tab-content active" id="tab-lista">
        <div class="filter-bar mb-16">
          <div class="search-input-wrap">
            <i class="fas fa-search"></i>
            <input class="search-input" type="text" id="searchInput" placeholder="Buscar cliente…"/>
          </div>
          <select id="filterStatus" class="btn btn-ghost btn-sm" style="border:1px solid var(--border)">
            <option value="">Todos os status</option>
            <option value="pendente">🕐 Pendente</option>
            <option value="confirmado">✅ Confirmado</option>
            <option value="concluido">✔️ Concluído</option>
            <option value="cancelado">❌ Cancelado</option>
            <option value="faltou">⚠️ Faltou</option>
          </select>
          <select id="filterProf" class="btn btn-ghost btn-sm" style="border:1px solid var(--border)">
            <option value="">Todos profissionais</option>
          </select>
          <input type="date" id="filterData" class="btn btn-ghost btn-sm" style="border:1px solid var(--border)"/>
          <button class="btn btn-ghost btn-sm" id="clearFilters"><i class="fas fa-times"></i></button>
        </div>
        <div class="table-container">
          <table>
            <thead><tr>
              <th>Cliente</th><th>Serviços / Profissional</th>
              <th>Data/Hora</th><th>Total</th><th>Status</th><th>Ações</th>
            </tr></thead>
            <tbody id="tbodyAgs">
              <tr><td colspan="6"><div class="loading"><i class="fas fa-circle-notch spin"></i></div></td></tr>
            </tbody>
          </table>
        </div>
        <div id="paginacao" class="pagination"></div>
      </div>

      <!-- TAB CALENDÁRIO -->
      <div class="tab-content" id="tab-calendario">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
          <button class="btn btn-ghost btn-sm" id="prevMonth"><i class="fas fa-chevron-left"></i></button>
          <h3 id="calTitle" style="font-size:1rem;font-weight:700;flex:1;text-align:center"></h3>
          <button class="btn btn-ghost btn-sm" id="nextMonth"><i class="fas fa-chevron-right"></i></button>
          <button class="btn btn-secondary btn-sm" id="todayBtn">Hoje</button>
        </div>
        <div class="heatmap-labels">
          <span>Dom</span><span>Seg</span><span>Ter</span>
          <span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span>
        </div>
        <div class="heatmap-grid" id="calGrid"></div>
        <div id="calDayDetail" style="margin-top:16px"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══ MODAL NOVO/EDITAR AGENDAMENTO ══ -->
<div class="modal-overlay" id="modal">
  <div class="modal modal-xl">
    <div class="modal-header">
      <h3 id="modalTitle"><i class="fas fa-calendar-plus"></i> Novo Agendamento</h3>
      <button class="modal-close" id="closeModal"><i class="fas fa-times"></i></button>
    </div>

    <!-- Cliente -->
    <div class="form-row form-row-2">
      <div class="form-group">
        <label>Cliente *</label>
        <select id="mCliente"><option value="">Selecione o cliente…</option></select>
      </div>
      <div class="form-group">
        <label>Forma de Pagamento</label>
        <select id="mPagamento">
          <option value="dinheiro">Dinheiro</option>
          <option value="pix">PIX</option>
          <option value="cartao_debito">Cartão Débito</option>
          <option value="cartao_credito">Cartão Crédito</option>
          <option value="outros">Outros</option>
        </select>
      </div>
    </div>

    <!-- Para outro -->
    <div class="form-group">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:6px">
        <input type="checkbox" id="mParaOutro" style="width:auto"/>
        Agendar para outra pessoa
      </label>
      <div id="mOutroWrap" style="display:none">
        <input type="text" id="mNomeOutro" placeholder="Nome da pessoa que será atendida"/>
      </div>
    </div>

    <!-- Serviços (com duração) -->
    <div class="form-group">
      <label><i class="fas fa-cut" style="color:var(--primary-light)"></i> Serviços <small style="color:var(--text3)">(com duração)</small></label>
      <div id="mServicosList"></div>
      <button class="btn btn-ghost btn-sm mt-8" id="mAddServico" type="button">
        <i class="fas fa-plus"></i> Adicionar serviço
      </button>
    </div>

    <!-- Produtos (sem duração) -->
    <div class="form-group">
      <label><i class="fas fa-shopping-bag" style="color:var(--secondary)"></i> Produtos <small style="color:var(--text3)">(sem duração — opcional)</small></label>
      <div id="mProdutosList"></div>
      <button class="btn btn-ghost btn-sm" id="mAddProduto" type="button">
        <i class="fas fa-plus"></i> Adicionar produto
      </button>
    </div>

    <!-- Heatmap de seleção de data -->
    <div class="form-group">
      <label><i class="fas fa-calendar-alt" style="color:var(--warning)"></i> Selecione a Data</label>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <button class="btn btn-ghost btn-sm" id="heatPrev"><i class="fas fa-chevron-left"></i></button>
        <span id="heatTitle" style="flex:1;text-align:center;font-size:.88rem;font-weight:700"></span>
        <button class="btn btn-ghost btn-sm" id="heatNext"><i class="fas fa-chevron-right"></i></button>
      </div>
      <div class="heatmap-labels">
        <span>Dom</span><span>Seg</span><span>Ter</span>
        <span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span>
      </div>
      <div class="heatmap-grid" id="heatGrid"></div>
      <div style="display:flex;gap:14px;margin-top:6px;font-size:.71rem;color:var(--text2);flex-wrap:wrap">
        <span><span style="display:inline-block;width:11px;height:11px;background:var(--bg3);border-radius:2px;margin-right:4px;vertical-align:middle"></span>Disponível</span>
        <span><span style="display:inline-block;width:11px;height:11px;background:rgba(99,102,241,.6);border-radius:2px;margin-right:4px;vertical-align:middle"></span>Lotado</span>
        <span><span style="display:inline-block;width:11px;height:11px;border-radius:2px;margin-right:4px;vertical-align:middle;background:repeating-linear-gradient(45deg,var(--bg3) 0,var(--bg3) 2px,transparent 2px,transparent 5px);border:1px solid var(--border)"></span>Fechado</span>
      </div>
    </div>

    <!-- Slots de horário -->
    <div class="form-group" id="slotsWrap" style="display:none">
      <label><i class="fas fa-clock" style="color:var(--secondary)"></i> Horários disponíveis — <span id="slotDate"></span></label>
      <div class="slots-grid" id="slotsContainer"></div>
      <div style="margin-top:10px;font-size:.78rem;color:var(--text2);display:flex;align-items:center;gap:8px">
        Ou informe manualmente:
        <input type="time" id="mHoraManual"
          style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;
                 padding:5px 8px;color:var(--text);font-size:.8rem"/>
      </div>
    </div>

    <div class="form-group">
      <label>Observações</label>
      <textarea id="mObs" placeholder="Anotações sobre o agendamento…" rows="2"></textarea>
    </div>

    <!-- Resumo -->
    <div id="mResumo" style="display:none;background:var(--bg3);border:1px solid var(--border);
         border-radius:10px;padding:14px;margin-bottom:12px">
      <div style="font-size:.84rem;font-weight:700;margin-bottom:8px">📋 Resumo do Agendamento</div>
      <div id="mResumoContent" style="font-size:.82rem;color:var(--text2);display:flex;flex-direction:column;gap:4px"></div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" id="cancelModal">Cancelar</button>
      <button class="btn btn-primary" id="salvar"><i class="fas fa-save"></i> Salvar Agendamento</button>
    </div>
  </div>
</div>

<!-- ══ MODAL DETALHES ══ -->
<div class="modal-overlay" id="modalDetalhes">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3><i class="fas fa-calendar-check"></i> Detalhes do Agendamento</h3>
      <button class="modal-close" id="closeModalDetalhes"><i class="fas fa-times"></i></button>
    </div>
    <div id="detalhesContent"></div>
    <div class="modal-footer" id="detalhesFtr"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
import { requireAuth, renderUserInSidebar, showToast, isAdmin } from './supabase/session-manager.js';
import {
  getAllAgendamentos, getAgendamento, createAgendamento, updateAgendamento,
  getHeatmapDoMes, getSlotsDisponiveis,
  getAllClientes, getAllEquipe, getAllServicos, getHorarios,
  formatCurrency, formatDateTime, formatDate, formatTime,
  STATUS_LABELS, PAGAMENTO_LABELS
} from './supabase/database.js';
import { getSidebarHTML, initSidebarToggle, showAdminItems } from './js/sidebar.js';

document.getElementById('sidebarMount').innerHTML = getSidebarHTML('agendamentos');
initSidebarToggle();
const auth = await requireAuth();
if (!auth) throw new Error('Not authenticated');
const { user, profile } = auth;
const adminMode = isAdmin(user, profile);
renderUserInSidebar(profile);
if (adminMode) showAdminItems();
setTimeout(() => document.getElementById('pageLoader')?.classList.add('hide'), 400);
document.getElementById('logoutBtn')?.addEventListener('click', () =>
  import('./supabase/database.js').then(m => m.signOut()).then(() => window.location.href = 'index.html'));

// ── Tabs ─────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn[data-tab]').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`tab-${btn.dataset.tab}`)?.classList.add('active');
    if (btn.dataset.tab === 'calendario') renderCalendar();
  });
});

// ── Auto-refresh every 30s ────────────────────────────────────
let countdown = 30;
const countdownEl = document.getElementById('refreshCountdown');
function tickCountdown() {
  countdown--;
  if (countdownEl) countdownEl.textContent = countdown + 's';
  if (countdown <= 0) { countdown = 30; loadAll(); }
}
let countdownTimer = setInterval(tickCountdown, 1000);
document.getElementById('btnRefresh')?.addEventListener('click', () => {
  clearInterval(countdownTimer); countdown = 30;
  if (countdownEl) countdownEl.textContent = '30s';
  loadAll(); countdownTimer = setInterval(tickCountdown, 1000);
});
document.addEventListener('visibilitychange', () => {
  if (document.hidden) clearInterval(countdownTimer);
  else { countdown = 30; loadAll(); countdownTimer = setInterval(tickCountdown, 1000); }
});

// ── State ────────────────────────────────────────────────────
let allAgs = [], filteredAgs = [], equipe = [], clientes = [], servicos = [], horarios = [];
let currentPage = 1, perPage = 20;
let calYear = new Date().getFullYear(), calMonth = new Date().getMonth() + 1;
let heatYear = new Date().getFullYear(), heatMonth = new Date().getMonth() + 1;
let selectedDate = null, selectedTime = null;

// ── Load all data ─────────────────────────────────────────────
async function loadAll() {
  try {
    [equipe, clientes, servicos, horarios] = await Promise.all([
      getAllEquipe(), getAllClientes(), getAllServicos(), getHorarios()
    ]);

    // Populate prof filter
    const selProf = document.getElementById('filterProf');
    const curVal  = selProf.value;
    selProf.innerHTML = '<option value="">Todos profissionais</option>' +
      equipe.map(e => `<option value="${e.id}">${e.nome}</option>`).join('');
    if (curVal) selProf.value = curVal;

    allAgs = await getAllAgendamentos({});
    // Non-admin: only show agendamentos they created
    if (!adminMode) allAgs = allAgs.filter(a => a.criado_por === user.id);

    applyFilters();
  } catch (err) {
    console.error('loadAll agendamentos:', err);
    showToast('Erro ao carregar agendamentos.', 'error');
  }
}

// ── Filters ───────────────────────────────────────────────────
function applyFilters() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('filterStatus').value;
  const profId = document.getElementById('filterProf').value;
  const data   = document.getElementById('filterData').value;

  filteredAgs = allAgs.filter(a => {
    if (search && !a.clientes?.nome?.toLowerCase().includes(search)) return false;
    if (status && a.status !== status) return false;
    if (profId && !a.agendamento_servicos?.some(s => s.equipe?.id === profId)) return false;
    if (data   && !a.data_hora?.startsWith(data)) return false;
    return true;
  });
  currentPage = 1;
  render();
}

function render() {
  const start = (currentPage - 1) * perPage;
  const page  = filteredAgs.slice(start, start + perPage);
  const tbody = document.getElementById('tbodyAgs');

  if (!filteredAgs.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">
      <i class="fas fa-calendar-times"></i><h3>Nenhum agendamento encontrado</h3>
      <p>Clique em "Novo" para criar um agendamento.</p></div></td></tr>`;
  } else {
    tbody.innerHTML = page.map(ag => {
      const st       = STATUS_LABELS[ag.status] || {};
      const servNomes = ag.agendamento_servicos?.map(s => s.servicos?.nome || '').filter(Boolean).join(', ') || '—';
      const profNome  = ag.agendamento_servicos?.map(s => s.equipe?.nome || '').filter(Boolean).join(', ') || '—';
      const cor       = ag.agendamento_servicos?.[0]?.equipe?.cor_agenda || '#6366f1';
      const canEdit   = adminMode || ag.status === 'pendente';
      return `<tr>
        <td>
          <strong>${ag.clientes?.nome || '—'}</strong>
          ${ag.para_outro ? `<br><small style="color:var(--warning)"><i class="fas fa-user-friends"></i> Para: ${ag.nome_outro || 'outro'}</small>` : ''}
          <br><small style="color:var(--text3)">${ag.clientes?.telefone || ''}</small>
        </td>
        <td>
          <div style="font-size:.84rem">${servNomes}</div>
          <div style="font-size:.76rem;color:var(--text2);display:flex;align-items:center;gap:5px">
            <span style="width:7px;height:7px;border-radius:50%;background:${cor};flex-shrink:0"></span>${profNome}
          </div>
        </td>
        <td>${formatDateTime(ag.data_hora)}</td>
        <td><strong>${formatCurrency(ag.valor_total || 0)}</strong></td>
        <td><span class="badge" style="background:${st.color}22;color:${st.color}">${st.icon || ''} ${st.label || ag.status}</span></td>
        <td class="td-actions">
          <button class="btn btn-ghost btn-sm btn-icon" onclick="verDetalhes('${ag.id}')" title="Ver detalhes">
            <i class="fas fa-eye"></i>
          </button>
          ${canEdit && adminMode ? `<button class="btn btn-ghost btn-sm btn-icon" onclick="verDetalhes('${ag.id}')" title="Alterar status">
            <i class="fas fa-exchange-alt"></i>
          </button>` : ''}
        </td>
      </tr>`;
    }).join('');
  }
  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(filteredAgs.length / perPage);
  if (total <= 1) { document.getElementById('paginacao').innerHTML = ''; return; }
  let html = `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})"><i class="fas fa-chevron-left"></i></button>`;
  for (let p = 1; p <= total; p++) {
    if (p === 1 || p === total || Math.abs(p - currentPage) <= 1)
      html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`;
    else if (Math.abs(p - currentPage) === 2)
      html += `<span style="padding:0 4px;color:var(--text3)">…</span>`;
  }
  html += `<button class="page-btn" ${currentPage === total ? 'disabled' : ''} onclick="goPage(${currentPage + 1})"><i class="fas fa-chevron-right"></i></button>`;
  document.getElementById('paginacao').innerHTML = html;
}
window.goPage = p => { currentPage = p; render(); };

['filterStatus', 'filterProf', 'filterData'].forEach(id =>
  document.getElementById(id)?.addEventListener('change', applyFilters));
document.getElementById('searchInput')?.addEventListener('input', applyFilters);
document.getElementById('clearFilters')?.addEventListener('click', () => {
  ['searchInput', 'filterStatus', 'filterProf', 'filterData'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  applyFilters();
});

// ── Calendário ────────────────────────────────────────────────
async function renderCalendar() {
  document.getElementById('calTitle').textContent =
    new Date(calYear, calMonth - 1, 1).toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
  const heatmap   = await getHeatmapDoMes(calYear, calMonth);
  const firstDay  = new Date(calYear, calMonth - 1, 1).getDay();
  const daysInMon = new Date(calYear, calMonth, 0).getDate();
  const today     = new Date();

  let html = '';
  for (let i = 0; i < firstDay; i++) html += '<div class="heatmap-day empty"></div>';
  for (let d = 1; d <= daysInMon; d++) {
    const count   = heatmap[d] || 0;
    const heat    = count === 0 ? 0 : count <= 2 ? 1 : count <= 4 ? 2 : count <= 7 ? 3 : 4;
    const date    = new Date(calYear, calMonth - 1, d);
    const isToday = date.toDateString() === today.toDateString();
    const isPast  = date < new Date(today.toDateString());
    const dow     = date.getDay();
    const horar   = horarios.find(x => x.dia_semana === dow);
    const closed  = horar && !horar.aberto;
    let cls = `heatmap-day heat-${heat}`;
    if (isToday) cls += ' today';
    if (isPast)  cls += ' past';
    if (closed)  cls += ' closed';
    html += `<div class="${cls}" onclick="showCalDay(${calYear},${calMonth},${d})" title="${count} agendamento(s)">${d}</div>`;
  }
  document.getElementById('calGrid').innerHTML = html;
  document.getElementById('calDayDetail').innerHTML = '';
}

window.showCalDay = async (y, m, d) => {
  const ags = allAgs.filter(a => {
    const dt = new Date(a.data_hora);
    return dt.getFullYear() === y && dt.getMonth() + 1 === m && dt.getDate() === d;
  });
  const dateStr = new Date(y, m - 1, d).toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long' });
  const el = document.getElementById('calDayDetail');
  if (!ags.length) {
    el.innerHTML = `<div class="card" style="padding:14px"><p style="color:var(--text2)">📭 Nenhum agendamento em ${dateStr}.</p></div>`;
    return;
  }
  el.innerHTML = `<div class="card">
    <div class="card-header"><span class="card-title">📅 ${dateStr} — ${ags.length} agendamento(s)</span></div>
    ${ags.map(ag => {
      const st = STATUS_LABELS[ag.status] || {};
      const servNomes = ag.agendamento_servicos?.map(s => s.servicos?.nome || '').filter(Boolean).join(', ') || '—';

// ── Heatmap picker ────────────────────────────────────────────
async function renderHeatmap() {
  document.getElementById('heatTitle').textContent =
    new Date(heatYear, heatMonth - 1, 1).toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
  const heatmap  = await getHeatmapDoMes(heatYear, heatMonth);
  const firstDay = new Date(heatYear, heatMonth - 1, 1).getDay();
  const days     = new Date(heatYear, heatMonth, 0).getDate();
  const today    = new Date();

  let html = '';
  for (let i = 0; i < firstDay; i++) html += '<div class="heatmap-day empty"></div>';
  for (let d = 1; d <= days; d++) {
    const count   = heatmap[d] || 0;
    const heat    = count === 0 ? 0 : count <= 2 ? 1 : count <= 4 ? 2 : count <= 7 ? 3 : 4;
    const date    = new Date(heatYear, heatMonth - 1, d);
    const isToday = date.toDateString() === today.toDateString();
    const isPast  = date < new Date(today.toDateString());
    const dow     = date.getDay();
    const horar   = horarios.find(x => x.dia_semana === dow);
    const closed  = horar && !horar.aberto;
    const dateKey = `${heatYear}-${String(heatMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isSel   = selectedDate === dateKey;
    let cls = `heatmap-day heat-${heat}`;
    if (isToday) cls += ' today';
    if (isPast && !isToday) cls += ' past';
    if (closed) cls += ' closed';
    if (isSel)  cls += ' selected';
    const clickable = !isPast && !closed;
    html += `<div class="${cls}" ${clickable ? `onclick="selectDate(${heatYear},${heatMonth},${d})"` : ''} title="${count} agendamento(s)">${d}</div>`;
  }
  document.getElementById('heatGrid').innerHTML = html;
}

window.selectDate = async (y, m, d) => {
  selectedDate = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  selectedTime = null;
  document.getElementById('mHoraManual').value = '';
  await renderHeatmap();

  // Get first profissional & duration
  const validSvc = svcRows.filter(Boolean).filter(s => s.servico_id);
  const profId   = validSvc[0]?.profissional_id || null;
  const durMin   = validSvc.reduce((a, s) => a + (s.duracao_min || 60), 0) || 60;

  const slots = await getSlotsDisponiveis(selectedDate, profId, durMin);
  const slotsWrap = document.getElementById('slotsWrap');
  slotsWrap.style.display = '';
  document.getElementById('slotDate').textContent =
    new Date(y, m - 1, d).toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long' });

  const container = document.getElementById('slotsContainer');
  if (!slots.length) {
    container.innerHTML = '<p style="color:var(--text2);font-size:.84rem"><i class="fas fa-exclamation-circle"></i> Nenhum horário disponível neste dia.</p>';
    return;
  }
  container.innerHTML = slots.map(s =>
    `<button class="slot-btn${selectedTime === s.hora ? ' selected' : ''}" onclick="selectSlot('${s.hora}','${s.iso}')">${s.hora}</button>`
  ).join('');
  updateResumo();
};

window.selectSlot = (hora, iso) => {

    b.classList.toggle('selected', b.textContent.trim() === hora));

  updateResumo();
};

        <select onchange="onSvcChange(${idx},this)">

              ${s.icone || ''} ${s.nome} — ${formatCurrency(s.preco)} (${s.duracao_min || 60}min)

// ── Resumo ────────────────────────────────────────────────────
function updateResumo() {
  const validSvc  = svcRows.filter(Boolean).filter(s => s.servico_id);
  const validProd = prodRows.filter(Boolean).filter(p => p.servico_id);
  if (!validSvc.length && !validProd.length) {
    document.getElementById('mResumo').style.display = 'none'; return;
  }
  const totalSvc  = validSvc.reduce((a, s) => a + s.preco, 0);
  const totalProd = validProd.reduce((a, p) => a + (p.preco_unitario * p.quantidade), 0);
  const total     = totalSvc + totalProd;

  let lines = validSvc.map(s => {
    const svcNome  = servicos.find(x => x.id === s.servico_id)?.nome || 'Serviço';
    const profNome = equipe.find(x => x.id === s.profissional_id)?.nome || 'Qualquer profissional';
    return `<div style="display:flex;justify-content:space-between">
      <span>✂️ ${svcNome} <span style="color:var(--text3)">(${profNome})</span></span>
      <span>${formatCurrency(s.preco)}</span></div>`;
  }).join('');

  lines += validProd.map(p => {
    const prodNome = servicos.find(x => x.id === p.servico_id)?.nome || 'Produto';
    return `<div style="display:flex;justify-content:space-between">
      <span>🛍️ ${prodNome} ×${p.quantidade}</span>
      <span>${formatCurrency(p.preco_unitario * p.quantidade)}</span></div>`;
  }).join('');

  lines += `<div style="display:flex;justify-content:space-between;border-top:1px solid var(--border);
    margin-top:8px;padding-top:8px;font-weight:700">
    <span>Total</span><span style="color:var(--secondary)">${formatCurrency(total)}</span></div>`;

  if (selectedDate && (selectedTime || document.getElementById('mHoraManual').value)) {
    const hora = selectedTime || document.getElementById('mHoraManual').value;
    lines += `<div style="margin-top:6px;color:var(--primary-light);font-size:.8rem">
      <i class="fas fa-clock"></i> ${selectedDate} às ${hora}</div>`;
  }

  document.getElementById('mResumoContent').innerHTML = lines;
  document.getElementById('mResumo').style.display = '';
}

// ── Close / Open modal ────────────────────────────────────────
function closeModal() { document.getElementById('modal').classList.remove('open'); }

// ── Salvar Agendamento ────────────────────────────────────────
document.getElementById('salvar')?.addEventListener('click', async () => {
  const clienteId = document.getElementById('mCliente').value;
  if (!clienteId) { showToast('Selecione um cliente.', 'warning'); return; }

  const horaManual = document.getElementById('mHoraManual').value;
  const hora = selectedTime || horaManual;
  if (!selectedDate || !hora) { showToast('Selecione uma data e horário no calendário.', 'warning'); return; }

  const svcItems = svcRows.filter(Boolean).filter(s => s.servico_id);
  if (!svcItems.length) { showToast('Adicione pelo menos um serviço.', 'warning'); return; }

  const btn = document.getElementById('salvar');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-circle-notch spin"></i> Salvando…';
  try {
    const baseTime = new Date(`${selectedDate}T${hora}:00`);
    let offset = 0;
    const servicosPayload = svcItems.map(s => {
      const inicio = new Date(baseTime.getTime() + offset * 60000);
      const fim    = new Date(inicio.getTime() + (s.duracao_min || 60) * 60000);
      offset += s.duracao_min || 60;
      return { ...s, hora_inicio: inicio.toISOString(), hora_fim: fim.toISOString() };
    });

    const paraOutro  = document.getElementById('mParaOutro').checked;
    const prodItems  = prodRows.filter(Boolean).filter(p => p.servico_id);
    const duracaoTotal = svcItems.reduce((a, s) => a + (s.duracao_min || 60), 0);

    await createAgendamento({
      cliente_id:      clienteId,
      criado_por:      user.id,
      data_hora:       baseTime.toISOString(),
      duracao_min:     duracaoTotal,
      forma_pagamento: document.getElementById('mPagamento').value,
      observacoes:     document.getElementById('mObs').value || null,
      status:          'pendente',
      para_outro:      paraOutro,
      nome_outro:      paraOutro ? document.getElementById('mNomeOutro').value || null : null,
      servicos:        servicosPayload,
      produtos:        prodItems
    });

    showToast('Agendamento criado com sucesso!', 'success');
    closeModal();
    await loadAll();
  } catch (err) {
    showToast(err.message || 'Erro ao criar agendamento.', 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-save"></i> Salvar Agendamento';
  }
});

    const servNomes = ag.agendamento_servicos?.map(s =>
      `<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
        <span>${s.servicos?.icone || '✂️'}</span>
        <span>${s.servicos?.nome || '—'}</span>
        ${s.equipe ? `<span style="color:var(--text3)">→ ${s.equipe.nome}</span>` : ''}
        <span style="color:var(--text3)">(${s.duracao_min}min)</span>
        <strong>${formatCurrency(s.preco)}</strong>
      </div>`).join('') || '—';

    const prodNomes = ag.agendamento_produtos?.length
      ? ag.agendamento_produtos.map(p =>
        `<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
          <span>${p.servicos?.icone || '🛍️'}</span>
          <span>${p.servicos?.nome || '—'} ×${p.quantidade}</span>
          <strong>${formatCurrency((p.preco_unitario || 0) * p.quantidade)}</strong>
        </div>`).join('')
      : null;

    document.getElementById('detalhesContent').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;font-size:.87rem">
        <div>
          <label style="font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Cliente</label>
          <div style="font-weight:700;margin-top:2px">${ag.clientes?.nome || '—'}</div>
          <div style="color:var(--text2)">${ag.clientes?.telefone || ''}</div>
          ${ag.para_outro ? `<div style="color:var(--warning);margin-top:4px;font-size:.8rem">
            <i class="fas fa-user-friends"></i> Para: ${ag.nome_outro || 'outra pessoa'}</div>` : ''}
        </div>
        <div>
          <label style="font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Data / Hora</label>
          <div style="font-weight:700;margin-top:2px">${formatDateTime(ag.data_hora)}</div>
          <div style="color:var(--text2)">${ag.duracao_min} min no total</div>
        </div>
        <div style="grid-column:span 2">
          <label style="font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Serviços</label>
          <div style="margin-top:4px">${servNomes}</div>
        </div>
        ${prodNomes ? `<div style="grid-column:span 2">
          <label style="font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Produtos</label>
          <div style="margin-top:4px">${prodNomes}</div>
        </div>` : ''}
        <div>
          <label style="font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Pagamento</label>
          <div style="margin-top:2px">${PAGAMENTO_LABELS[ag.forma_pagamento] || ag.forma_pagamento}</div>
        </div>
        <div>
          <label style="font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Status</label>
          <div style="margin-top:4px">
            <span class="badge" style="background:${st.color}22;color:${st.color}">${st.icon || ''} ${st.label || ag.status}</span>
          </div>
        </div>
        <div style="grid-column:span 2;border-top:1px solid var(--border);padding-top:12px">
          <label style="font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Total</label>
          <div style="font-size:1.35rem;font-weight:800;color:var(--secondary);margin-top:2px">${formatCurrency(ag.valor_total || 0)}</div>
        </div>
        ${ag.observacoes ? `<div style="grid-column:span 2">
          <label style="font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Observações</label>
          <div style="color:var(--text2);margin-top:2px">${ag.observacoes}</div>
        </div>` : ''}
      </div>`;

    const ftr = document.getElementById('detalhesFtr');
    ftr.innerHTML = '';

    // Close button always present
    const btnClose2 = document.createElement('button');
    btnClose2.className = 'btn btn-secondary';
    btnClose2.textContent = 'Fechar';
    btnClose2.addEventListener('click', () => document.getElementById('modalDetalhes').classList.remove('open'));
    ftr.appendChild(btnClose2);

    // Admin: status editor
    if (adminMode) {
      const sel = document.createElement('select');
      sel.id = 'newStatus';
      sel.className = 'btn btn-ghost btn-sm';
      sel.style.border = '1px solid var(--border)';
      sel.innerHTML = `<option value="">Alterar status…</option>
        <option value="pendente">🕐 Pendente</option>
        <option value="confirmado">✅ Confirmado</option>
        <option value="concluido">✔️ Concluído</option>
        <option value="cancelado">❌ Cancelado</option>
        <option value="faltou">⚠️ Faltou</option>`;

      const btnSave = document.createElement('button');

      ftr.appendChild(btnSave);

    document.getElementById('detalhesContent').innerHTML =
      `<p style="color:var(--danger)"><i class="fas fa-exclamation-circle"></i> Erro: ${err.message}</p>`;
  }
};

document.getElementById('closeModalDetalhes')?.addEventListener('click', () =>
  document.getElementById('modalDetalhes').classList.remove('open'));

// ── URL params ────────────────────────────────────────────────
const urlId      = new URLSearchParams(location.search).get('id');
const urlCliente = new URLSearchParams(location.search).get('cliente');

await loadAll();
if (urlId)      setTimeout(() => verDetalhes(urlId), 300);
